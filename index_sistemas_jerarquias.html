            // Fotos y badge para grupos colapsables cuando están minimizados
            const GRUPOS_COLAPSABLES = ["GRP_CARNICOS", "GRP_PECUARIOS"];
            GRUPOS_COLAPSABLES.forEach(function (groupId) {
              const grpNode = sender.getNode(groupId);
              if (!grpNode || !grpNode.min) return;

              // Badge contador (esquina superior derecha)
              const ids = [];
              iterate(sender, grpNode, ids, groupId);
              const count = ids.length;
              if (count > 0) {
                const bx = grpNode.x + grpNode.w;
                const by = grpNode.y;
                args.content +=
                  `<g transform="translate(${bx},${by})">` +
                  `<circle r="22" fill="#F57C00" stroke="#ffffff" stroke-width="2.5"/>` +
                  `<text text-anchor="middle" dominant-baseline="central" fill="#ffffff" style="font-size:13px;font-weight:bold;">${count}</text>` +
                  `</g>`;
              }

              // Mini fotos: traversal via chart.config.nodes (datos, no posiciones — funciona con grupo colapsado)
              const personIds = [];
              const allConfigNodes = chart.config.nodes || [];
              function collectPeople(nodeId) {
                if (personIds.length >= 6) return;
                const sid = String(nodeId);
                const data = sender.get(nodeId);
                if (!data) return;
                const isSkip =
                  sid.startsWith("HEAD_") ||
                  sid.startsWith("GRP_") ||
                  (data.tags && data.tags.includes("fantasma"));
                if (isSkip) {
                  // Person nodes connect via pid OR stpid to HEAD nodes
                  allConfigNodes
                    .filter(function (n) {
                      return String(n.stpid) === sid || String(n.pid) === sid;
                    })
                    .forEach(function (n) {
                      collectPeople(n.id);
                    });
                } else {
                  personIds.push(nodeId);
                }
              }
              // HEAD nodes connect via stpid to GRP
              allConfigNodes
                .filter(function (n) {
                  return (
                    String(n.stpid) === groupId || String(n.pid) === groupId
                  );
                })
                .forEach(function (n) {
                  collectPeople(n.id);
                });

              const pCount = Math.min(personIds.length, 6);
              if (pCount === 0) return;
              const imgW = 55,
                gap = 8;
              // Grid 3+3: fila 1 = primeras 3, fila 2 = restantes centradas
              const row1 = Math.min(pCount, 3);
              const row2 = pCount - row1;
              const totalRows = row2 > 0 ? 2 : 1;
              const totalH = totalRows * imgW + (totalRows - 1) * gap;
              // Centrar entre el texto del título (~40px desde top) y el borde inferior
              const titleH = 20;
              const areaTop = grpNode.y + titleH;
              const areaH = grpNode.h - titleH;
              const baseY = areaTop + areaH / 2 - totalH / 2;
              const row1W = row1 * imgW + (row1 - 1) * gap;
              const row1X = grpNode.x + grpNode.w / 2 - row1W / 2;
              const row2W = row2 * imgW + (row2 - 1) * gap;
              const row2X = grpNode.x + grpNode.w / 2 - row2W / 2;
              let defs = `<defs>`;
              for (let i = 0; i < pCount; i++) {
                const row = i < row1 ? 0 : 1;
                const col = i < row1 ? i : i - row1;
                const startX = row === 0 ? row1X : row2X;
                const cx = startX + col * (imgW + gap) + imgW / 2;
                const cy = baseY + row * (imgW + gap) + imgW / 2;
                defs += `<clipPath id="cpgrp-${groupId}-${i}"><circle cx="${cx}" cy="${cy}" r="${imgW / 2}"/></clipPath>`;
              }
              defs += `</defs>`;
              args.content += defs;
              for (let i = 0; i < pCount; i++) {
                const data = sender.get(personIds[i]);
                if (data && data.img) {
                  const row = i < row1 ? 0 : 1;
                  const col = i < row1 ? i : i - row1;
                  const startX = row === 0 ? row1X : row2X;
                  const x = startX + col * (imgW + gap);
                  const y = baseY + row * (imgW + gap);
                  args.content +=
                    `<image href="${data.img}" x="${x}" y="${y}" ` +
                    `width="${imgW}" height="${imgW}" preserveAspectRatio="xMidYMid slice" ` +
                    `clip-path="url(#cpgrp-${groupId}-${i})"/>`;
                }
              }
            });

            args.content = svgLines + args.content;
          });

            chart.searchUI.input.addEventListener("input", function (e) {

              if (!query) return;

              const procesarFilas = () => {
                const rows = document.querySelectorAll(
                  "tr[data-search-item-id]",
                );
                if (rows.length === 0) return;

                rows.forEach((row) => {
                  const nodeId = row.getAttribute("data-search-item-id");

                    !nodeData?.listaEmpleados ||

                  const td = row.querySelector("td.boc-search-text-td");

                  const br = td.querySelector("br");
                  if (!br) return;

                  // Reordenar nombres
                  let listaNombres = nodeData.listaEmpleados.map((emp) =>
                    `${emp.nombre || ""} ${emp.apellido || ""}`.trim(),
                  );

                  const matchIndex = listaNombres.findIndex((n) =>
                    n.toLowerCase().includes(query),
                  );
                  if (matchIndex > 0) {
                    const matchName = listaNombres.splice(matchIndex, 1)[0];
                    listaNombres.unshift(matchName);
                  }

                  // Resaltar query
                  const resaltar = (nombre) => {
                    const idx = nombre.toLowerCase().indexOf(query);
                    if (idx === -1) return nombre;
                    return (
                      nombre.substring(0, idx) +
                      `<mark>${nombre.substring(idx, idx + query.length)}</mark>` +
                      nombre.substring(idx + query.length)
                    );

                  let nuevoHtml = resaltar(listaNombres[0]);

                  while (sibling) {
                    const next = sibling.nextSibling;
                    td.removeChild(sibling);
                    sibling = next;
                  }

                  // Insertar nuevo HTML
                  const span = document.createElement("span");
                  span.innerHTML = nuevoHtml;
                  while (span.firstChild) {
                    td.appendChild(span.firstChild);
                  }

                const observer = new MutationObserver(() => {
                  observer.disconnect(); // Solo ejecutar una vez
                  procesarFilas();

                observer.observe(searchTable, {
                  childList: true,
                  subtree: true,

      /** Carga, transforma y renderiza la data de CARGOS.    */
      async function loadAndRenderCargoChart(apiUrl, filtrosGuardados = null) {
        // Objeto por defecto si no se pasan filtros
        if (!filtrosGuardados) {
          filtrosGuardados = {
            linea: "todos",
            costo: "todos",
            depto: "todos",
          };
        }

        // Esta función repobla y restaura los filtros para la vista de Cargo
        function poblarYRestaurarFiltrosCargo() {
          const sourceNodes = allCargoNodes;
          console.log("Restaurando filtros para vista Cargo...");

          populateSelect("linea-negocio-select", "lineaNegocio", sourceNodes);

          if (
            $(
              "#linea-negocio-select option[value='" +
                filtrosGuardados.linea +
                "']",
            ).length > 0
          ) {
            $("#linea-negocio-select").val(filtrosGuardados.linea);
          } else {
            $("#linea-negocio-select").val("todos");
          }

          $(".control-select").trigger("change.select2");

          // ✅ Usar renderOrganigramaGrupos (que ya detecta el modo)
          renderOrganigramaGrupos();
        }

        if (isCargoDataReady) {
          console.log("Datos de Cargos ya cargados. Usando cache.");

          // Simplemente llamamos a la función que repuebla y aplica filtros
          poblarYRestaurarFiltrosCargo();
          return; // Salimos de la función
        }

        statusDiv.innerText = "Cargando vista de Cargos...";
        statusDiv.style.display = "block";

        try {
          const response = await fetch(apiUrl);
          if (!response.ok) throw new Error(`Error HTTP ${response.status}`);
          const apiResponse = await response.json();

          // Extrae la data de la propiedad "Cargo"
          const flatApiData = Array.isArray(apiResponse?.Cargo)
            ? apiResponse.Cargo
            : null;
          if (!Array.isArray(flatApiData))
            throw new Error(
              "Formato inválido. No se encontró array en 'Cargo'.",
            );

          console.log(
            `Datos de Cargo recibidos (${flatApiData.length}). Procesando...`,
          );

          // --- Transformación de "Cargo" ---
          const balkanCargoNodes = flatApiData
            .filter(
              (cargo) =>
                cargo &&
                cargo.codigoPosicion != "00006" &&
                //cargo.codigoPosicionReporta != "00424" && //Este id no aparece en la api pero si en la viewEmployeers
                //&& !(cargo.codigoPosicionReporta === '00006' && cargo.codigoPosicion !== '00001')
                //&& !['00006', '00416', '00330', '00353'].includes(cargo.codigoPosicion)
                cargo.puesto != null,
            ) // Filtro básico
            .map((cargo) => {
              const isVacant = cargo.esVacante === "1";
              const id = String(cargo.codigoPosicion).trim();
              let pid = cargo.codigoPosicionReporta
                ? String(cargo.codigoPosicionReporta).trim()
                : null;

              if (pid === "0" || pid === id) pid = undefined; // Evitar auto-referencia

              // Lógica de Tags
              const levelTag = `level-${cargo.nivelJerarquico || "99"}`;
              let tags = [levelTag];

              if (isVacant) {
                tags.push("vacante");
              }

              const order = parseInt(cargo.nivelJerarquico || 99);

              // --- LÓGICA PARA MANEJAR 'Empleado' (Objeto o Array) ---
              let listaEmpleados = []; // Almacenará el array de empleados
              let primerEmpleado = null; // Para datos de manuales
              let cargoPersonaDisplay = "PUESTO VACANTE"; // Nombre para el nodo
              let cargoPersonaImgDisplay;

              let CodEmpleado = null; //999999999; // Valor alto por defecto (para ir al final)

              if (!isVacant && cargo.Empleado) {
                if (
                  Array.isArray(cargo.Empleado) &&
                  cargo.Empleado.length > 0
                ) {
                  // Es un array de empleados
                  listaEmpleados = cargo.Empleado;
                  primerEmpleado = cargo.Empleado[0];
                  // console.log(
                  //   "Lista de Empleados para cargo",
                  //   id,
                  //   listaEmpleados,
                  // );
                  // console.log(primerEmpleado);
                  cargoPersonaDisplay =
                    listaEmpleados.length === 1
                      ? `${listaEmpleados[0].nombre || ""} ${
                          listaEmpleados[0].apellido || ""
                        }`.trim() // Nombre si es 1
                      : `${listaEmpleados.length} PERSONAS ASIGNADAS`; // Conteo si son más
                  // cargoPersonaDisplay = `${listaEmpleados.length} PERSONAS ASIGNADAS`;
                  // --- LÓGICA DE ORDENAMIENTO PARA CARGOS ---
                  if (listaEmpleados.length === 1) {
                    // Si hay solo 1, usamos su código para ordenar
                    CodEmpleado =
                      parseInt(listaEmpleados[0].codigoEmpleado) || 999999999;
                  } else {
                    // Si hay varios, usamos un valor alto para que vayan al final (pero antes de los vacíos si quieres)
                    // O mantenemos el 999999999 para que se agrupen al final junto con otros sin código único
                    CodEmpleado = null; //999999998; // Ejemplo: Un poco antes que los vacantes/sin asignar puros
                  }
                } else if (
                  typeof cargo.Empleado === "object" &&
                  !Array.isArray(cargo.Empleado)
                ) {
                  // Es un solo empleado (objeto)
                  listaEmpleados = [cargo.Empleado];
                  primerEmpleado = cargo.Empleado;
                  cargoPersonaDisplay = `${primerEmpleado.nombre || ""} ${
                    primerEmpleado.apellido || ""
                  }`.trim();
                  cargoPersonaImgDisplay = primerEmpleado.foto;
                  // --- LÓGICA DE ORDENAMIENTO PARA CARGOS ---
                  // Si es un objeto directo, es un solo empleado
                  CodEmpleado = parseInt(primerEmpleado.codigoEmpleado) || null; //999999999;
                } else {
                  // Es un cargo no vacante pero sin datos de empleado
                  cargoPersonaDisplay = "Sin Asignar";
                }
              } else {
                //cargoPersonaDisplay = cargo.codigoPosicionReporta
              }

              return {
                id,
                pid,
                tags,
                order,
                CodEmpleado,
                // Campos para el template 'cargoTemplate'
                cargoPuesto: cargo.puesto || "Puesto N/A",

                  const asignados = listaEmpleados.length;
                  const vacantes = parseInt(cargo.plazasVacantes) || 0;

                  if (isVacant) {
                    return vacantes > 1
                      ? `${vacantes} PUESTOS VACANTES`
                      : "PUESTO VACANTE";
                  }
                  if (total > 0 && vacantes > 0) {
                    // Hay asignados Y vacantes
                    return `${asignados} DE ${total} PERSONAS ASIGNADAS`;
                  }
                  if (asignados === 1) {
                    return `${listaEmpleados[0].nombre || ""} ${listaEmpleados[0].apellido || ""}`.trim();
                  }
                  if (asignados > 1) {
                    return `${asignados} PERSONAS ASIGNADAS`;
                  }
                  return "Sin Asignar";

                  const todosLosNombres = listaEmpleados
                    .map((e) => `${e.nombre || ""} ${e.apellido || ""}`.trim())
                    .join(" ");
                  // Retornamos todo junto para que Balkan lo lea
                  return `${puestoBase} ${dept} ${todosLosNombres}`;
                  r; //eturn `${puestoBase} - ${dept}`;
                })(),

                  const dept =

                  return dept
                    ? `${cargo.puesto} - ${dept}`

                    : listaEmpleados
                        .map((e) =>

                centroCosto:
                  (primerEmpleado

                    : cargo.nombreCentroCosto) || "N/A",
                proposito:
                  (primerEmpleado

                area: determinarArea(
                  primerEmpleado

                ),

                // departamento:
                //   (primerEmpleado
                //     ? primerEmpleado.nombreDepartamento

                // Guardamos el ARRAY de empleados completo para el modal

                // puesto: cargo.puesto || "Puesto N/A",
                // img: cargoPersonaImgDisplay,

                // userid: null, //empleado ? empleado.userid : null,

                // Guardamos los datos para los manuales
                codDepAx: primerEmpleado ? primerEmpleado.codDepAx : null,
                codDepartamento: cargo.codDepartamento || null, // El 'codDepartamento' viene del cargo
              };
            });

          // Sanitizar (muy importante)
          const sanitizedCargoNodes =
            sanitizeCircularReferences(balkanCargoNodes);

          console.log(sanitizedCargoNodes);
          // Aplicamos la misma lógica de subniveles relativos
          aplicarSubnivelesRelativos(sanitizedCargoNodes);

          // Cargar la nueva data en el chart
          // 1. Guardar data (ya no se carga todo)
          allCargoNodes = sanitizedCargoNodes;
          isCargoDataReady = true;

          /* console.log(
            `Transformación de Cargo completa (${allCargoNodes.length} nodos).`
          ); */

          poblarYRestaurarFiltrosCargo();

          statusDiv.style.display = "none";
          //loaderOverlay.classList.remove("visible");
        } catch (error) {
          console.error("ERROR cargando Cargos:", error);
          errorDiv.innerText = `Error cargando Cargos: ${error.message}.`;
          errorDiv.style.display = "block";
        }
      }
