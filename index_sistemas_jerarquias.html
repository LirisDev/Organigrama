          //         if (grupoNode.pid) {
          //             agregarAscendencia(grupoNode.pid);
          //         }
          //     }
          // }
        }
        const Presidente = sourceNodes.find(
          (n) => n.codPosicion === "00001" || n.id === "00001",
        ); // Busca el ID en tu config maestra
        if (Presidente) {
          if (Presidente && !nodosDelFoco.has(Presidente.id)) {
            // Le forzamos el pid null y lo metemos al Corporativo para que salga perfecto arriba
            const presiClon = Object.assign({}, Presidente);
            presiClon.pid = null;
            presiClon.stpid = "GRP_CORPORATIVO";
            nodosDelFoco.set(presiClon.id, presiClon);
          }
        }

        agregarAscendencia(targetNodeId);

        // =========================================================
        // 3. AGREGAR DESCENDENCIA (Todos los hijos recursivamente)
        // =========================================================
        function agregarDescendenciaFoco(nodeId) {
          sourceMap.forEach((node) => {
            // 1. RELACIÓN DIRECTA: Si el nodo reporta directamente a este jefe (pid)
            // 2. HABITANTES DE CAJA: Si el nodeId es una CAJA, buscamos a los que viven adentro (stpid)
            if (
              (node.pid === nodeId || node.stpid === nodeId) &&
              !nodosDelFoco.has(node.id)
            ) {
              nodosDelFoco.set(node.id, Object.assign({}, node));
              // Recursión para nietos, bisnietos, etc.
              agregarDescendenciaFoco(node.id);
            }

            // 3. PUENTE UNIVERSAL PARA CLONES Y FANTASMAS:
            // Buscamos cualquier nodo visual que sea un "Clon" del empleado actual.
            if (
              String(node.id).endsWith(`_${nodeId}`) &&
              !nodosDelFoco.has(node.id)
            ) {
              if (String(node.id).startsWith("HEAD_")) {
                nodosDelFoco.set(node.id, Object.assign({}, node));
                agregarDescendenciaFoco(node.id);
              }
            }
          });
        }
        // 👻 PUENTE HACIA ABAJO: Si el nodo que estamos revisando tiene un clon Fantasma, traemos a sus hijos
        //     const posibleFantasmaId = `HEAD_LINEA_GRP_CARNICERIA_${nodeId}`;
        //     if (sourceMap.has(posibleFantasmaId) && !nodosDelFoco.has(posibleFantasmaId)) {
        //         const fantasma = sourceMap.get(posibleFantasmaId);
        //         nodosDelFoco.set(fantasma.id, Object.assign({}, fantasma));
        //         agregarDescendenciaFoco(fantasma.id);
        //     }
        // }

        agregarDescendenciaFoco(targetNodeId);

        /// 4. ASEGURAR CAJAS Y GRUPOS (stpid y pid dinámicos)
        // Un bucle que atrapa automáticamente a qué división o macrogrupo pertenece la persona
        let agregados;
        do {
          agregados = false;
          const actuales = Array.from(nodosDelFoco.values());
          actuales.forEach((node) => {
            // Si el nodo vive dentro de una caja (stpid) y la caja no está, la traemos
            if (node.stpid && !nodosDelFoco.has(node.stpid)) {
              const grupo = sourceMap.get(node.stpid);
              if (grupo) {
                nodosDelFoco.set(grupo.id, Object.assign({}, grupo));
                agregados = true;
              }
            }
            // Si la caja (o el nodo) reporta a un jefe (pid) y no está, lo traemos
            if (node.pid && !nodosDelFoco.has(node.pid)) {
              const padre = sourceMap.get(node.pid);
              if (padre) {
                nodosDelFoco.set(padre.id, Object.assign({}, padre));
                agregados = true;
              }
            }
          });
        } while (agregados); // Repetir hasta que todas las paredes estructurales estén firmes

        console.log(`✅ Árbol de foco construido: ${nodosDelFoco.size} nodos`);
        return nodosDelFoco;
      }

      /**
       * Activa el modo foco para un nodo específico
       */
      /**
       * Activa el modo foco para un nodo específico
       */
      function activarModoFoco(nodeId) {
        console.log("🔍 Activando modo foco para:", nodeId);
        // 1. Guardar la foto exacta del organigrama (solo si no estamos ya en foco)
        if (!focusState.active) {
          focusState.savedNodes = new Map(
            chart.config.nodes.map((n) => [n.id, Object.assign({}, n)]),
          );

          // Solo guardamos los IDs de los nodos que están abiertos en pantalla
          let abiertos = [];
          chart.config.nodes.forEach((n) => {
            const uiNode = chart.getNode(n.id);
            // Si el nodo está en la interfaz y está explícitamente abierto (no colapsado)
            if (uiNode && uiNode.collapsed === false) {
              abiertos.push(n.id);
            }
          });
          focusState.nodosAbiertos = abiertos; // Lo guardamos en memoria
        }

        focusState.targetNodeId = nodeId;
        focusState.active = true;

        // NUEVO: Deshabilitar filtros
        deshabilitarFiltros();

        const arbolFoco = construirArbolFoco(nodeId);
        if (!arbolFoco) {
          console.error("❌ No se pudo construir el árbol de foco");
          return;
        }

        // 2. Inyectar el tag "focused-node" al seleccionado
        const finalArray = Array.from(arbolFoco.values());
        finalArray.forEach((n) => {
          if (!n.tags) n.tags = [];
          if (n.id === nodeId) {
            n.tags.push("focused-node");
          }
          // Borramos la basura interna del historial
          delete n.state;
          delete n.expanded;
          delete n.collapsed;
        });

        // Agregar clase visual al contenedor
        document
          .getElementById("tree-container")
          .classList.add("focus-mode-active");

        // Marcar el botón específico como activo
        setTimeout(() => {
          const activeBtn = document.querySelector(
            `[data-focus-btn="${nodeId}"]`,
          );
          if (activeBtn) {
            activeBtn.classList.add("active");
          }
        }, 300);

        // 3. Activar bandera CSS en el contenedor principal
        document.getElementById("tree").classList.add("foco-activo");

        // APAGAMOS EXPANSIÓN GLOBAL
        chart.config.expand = { nodes: [], allChildren: false };
        // Quitamos la regla global de collapse para no confundir al motor
        chart.config.collapse = null;

        // 4. Cargar el nuevo árbol
        chart.load(finalArray);
        setTimeout(() => expandirFantasmas(), 10);

        // 5. LA CURA DEFINITIVA: FORZAR EL COLAPSO DESPUÉS DE CARGAR
        setTimeout(() => {
          // 1. Obligamos al gráfico a cerrar al nodo objetivo explícitamente.
          // Le pasamos un arreglo vacío para decirle "no muestres a ninguno de tus hijos".
          chart.expandCollapse(
            nodeId,
            [],
            chart.getNode(nodeId).childrenIds || [],
            () => {
              // 2. Una vez que el nodo está cerrado a la fuerza, centramos la cámara.
              chart.center(
                nodeId,
                {
                  anim: true,
                  duration: 200,
                  parentState: OrgChart.COLLAPSE_PARENT,
                },
                () => {
                  console.log("✅ Modo foco activado, colapsado y centrado");
                  chart.fit(); // Ajustamos la cámara al terminar
                },
              );
            },
          );
        }, 50); // Pequeño respiro para que Balkan termine de dibujar
      }
      /**
       * Desactiva el modo foco y restaura la vista anterior
       */
      function desactivarModoFoco() {
        console.log("🔙 Desactivando modo foco");
        if (!focusState.active) return;

        // 1. Limpieza visual (quitamos las clases del modo foco)
        document
          .getElementById("tree-container")
          .classList.remove("focus-mode-active");

        // Remover marca del botón
        const activeBtn = document.querySelector(".focus-btn.active");
        if (activeBtn) {
          activeBtn.classList.remove("active");
        }
        document.getElementById("tree").classList.remove("foco-activo");

        habilitarFiltros();

        // 2. Guardamos el ID para que la cámara no se pierda luego
        const lastFocusId = focusState.targetNodeId;

        // 3. APAGAMOS el estado del foco ANTES de recargar
        focusState.active = false;
        focusState.targetNodeId = null;
        focusState.savedNodes = null;
        // (No borramos nodosAbiertos todavía, lo necesitamos para el render)

        // Pasar el "borrador" por la base de datos global para quitar botones rojos viejos
        allNodes.forEach((n) => {
          if (n.tags) n.tags = n.tags.filter((t) => t !== "focused-node");
        });
        allCargoNodes.forEach((n) => {
          if (n.tags) n.tags = n.tags.filter((t) => t !== "focused-node");
        });

        // 4. Mandamos a reconstruir todo el mapa limpio desde cero
        renderOrganigramaGrupos();

        // 5. Centramos la cámara y ahora sí limpiamos la foto
        setTimeout(() => {
          chart.center(lastFocusId, { anim: true, duration: 200 });
          focusState.nodosAbiertos = []; // Vaciamos la memoria
        }, 200);
      }

      /**
       * Deshabilita los filtros visualmente y funcionalmente
       */
      function deshabilitarFiltros() {
        // Deshabilitar los select
        $("#linea-negocio-select, #modo-select").prop("disabled", true);

        // Notificar a Select2
        $("#linea-negocio-select, #modo-select").trigger("change.select2");
        console.log("🔒 Filtros deshabilitados");
      }

      /**
       * Habilita los filtros nuevamente
       */
      function habilitarFiltros() {
        // Habilitar los select
        $("#linea-negocio-select, #modo-select").prop("disabled", false);

        // Notificar a Select2
        $("#linea-negocio-select, #modo-select").trigger("change.select2");
        console.log("🔓 Filtros habilitados");
      }

      function renderOrganigramaGrupos() {
        if (!chart) return;

        console.log("🚀 renderOrganigramaGrupos INICIO");

        const selectedLineaRaw = $("#linea-negocio-select").val();
        if (!selectedLineaRaw || !selectedLineaRaw) return;

        // Normalizar valor (ej: "CARNICOS")
        const lineaFiltro = selectedLineaRaw.toUpperCase().trim();

        const esTodasLineas = lineaFiltro === "TODOS";

        // Si la línea es corporativo
        // DERIVADOS no tiene caja propia (CABEZAS_NEGOCIO_TEMP.DERIVADOS está
        // comentado a propósito) — su gente vive dentro del Comité de
        // Productos Derivados, que cuelga de la caja Corporativo. Filtrar
        // por Derivados debe mostrar Corporativo (donde está el Comité).
        const esSoloCorp =
          lineaFiltro === "CORPORATIVO" || lineaFiltro === "DERIVADOS";

        // La caja Corporativo (Antonio, Comité, gerentes) solo se arma cuando
        // se ven todas las líneas o cuando el filtro es explícitamente CORPORATIVO.
        // Si el usuario filtra por una línea de negocio puntual (ej. BALANCEADO),
        // esa línea se renderiza como raíz, sin la caja Corporativo encima.
        const mostrarCorporativo = esTodasLineas || esSoloCorp;

        const currentMode = document.getElementById("modo-select").value;
        const sourceNodes = currentMode === "Cargo" ? allCargoNodes : allNodes;

        // ✅ SELECCIONAR CONFIG SEGÚN MODO
        const CABEZAS_ACTIVAS =
          currentMode === "Cargo"
            ? CABEZAS_NEGOCIO_CARGO
            : CABEZAS_NEGOCIO_TEMP;
        const ESTRUCTURA_ACTIVA =
          currentMode === "Cargo" ? ESTRUCTURA_MACRO_CARGO : ESTRUCTURA_MACRO;

        if (!sourceNodes || sourceNodes.length === 0) {
          chart.load([]);
          return;
        }

        // const nodesToRender = new Map();
        // const sourceMap = new Map(sourceNodes.map((n) => [n.id, n]));

        const nodesToRender = new Map();

        // 1. CLONAMOS EL MAPA (Shallow Copy) PARA PODER MANIPULARLO SIN DAÑAR LA DATA GLOBAL
        const sourceMap = new Map();
        sourceNodes.forEach((n) => sourceMap.set(n.id, Object.assign({}, n)));

        // =========================================================
        // EXCEPCIÓN HARDCODEADA: EL CLON DE ANDRES HERRERA (9987)
        // =========================================================
        const idAndres = "9987";
        const andresOriginal = sourceMap.get(idAndres);

        if (andresOriginal) {
          // A. Creamos el clon visual de Andrés
          const idAndresClon = `CLON_CARNICOS_${idAndres}`;
          const andresClon = Object.assign({}, andresOriginal);
          andresClon.id = idAndresClon;

          // Le asignamos como jefe a Santiago (ID Original: HEAD_LINEA_GRP_CARNICOS_12), para que la recursividad de Cárnicos lo atrape.
          // OJO: Dejamos su lineaNegocio intacta ("RETAIL") para que el contador NO lo sume en Cárnicos.
          andresClon.pid = "1841"; // TODO: que le agarre al cargo y no a la persona

          // En renderOrganigramaGrupos, donde creas el clon de Andrés:
          andresClon.displayNombre = `${andresOriginal.nombre} (CÁRNICOS)`;

          // Lo guardamos en el mapa temporal para que el motor lo encuentre al dibujar
          sourceMap.set(idAndresClon, andresClon);

          // B. El Agente de Tránsito: Revisamos a los hijos de Andrés
          sourceMap.forEach((node) => {
            if (node.pid === idAndres) {
              // Si reporta al Andrés original
              const lineaHijo = (node.lineaNegocio || "").toUpperCase().trim();
              if (lineaHijo === "CARNICOS") {
                // TODO: cuando le cambien a retail a los demás descomentar esto
                //if (node.id === "2819") {

                // Si el hijo es de Cárnicos, lo divorciamos del original y lo enrutamos al clon
                node.pid = idAndresClon;
              }
            }
          });
        }
        // =========================================================

        // =========================================================
        // EXCEPCIÓN CARGOS: CLON DE LA POSICIÓN 01098 (Andrés/Hugo)
        // =========================================================
        if (currentMode === "Cargo") {
          const idPosClon = "00943";
          const posOriginal = sourceMap.get(idPosClon);

          if (posOriginal) {
            const idClon = `CLON_CARNICOS_${idPosClon}`;
            const posClon = Object.assign({}, posOriginal);
            posClon.id = idClon;
            posClon.pid = idPosClon; // Se conecta a sí mismo...
            // Espera — en cargos el pid ya apunta a su jefe real.
            // El clon necesita pid del gerente de Cárnicos en cargos
            posClon.pid = "01098"; // Santiago como Gerente de Cárnicos
            posClon.displayNombre = `${posOriginal.cargoPuesto} (CÁRNICOS)`;
            sourceMap.set(idClon, posClon);

            // Redirigir hijos CARNICOS al clon
            sourceMap.forEach((node) => {
              if (node.pid === idPosClon) {
                const lineaHijo = (node.lineaNegocio || "")
                  .toUpperCase()
                  .trim();
                if (lineaHijo === "CARNICOS") {
                  node.pid = idClon;
                }
              }
            });
          }
        }
        // Helper para buscar nodos
        const encontrarNodoPorConfig = (configId) => {
          if (!configId) return null;
          let nodo = sourceMap.get(configId);
          if (!nodo) nodo = sourceNodes.find((n) => n.codPosicion === configId);
          return nodo;
        };

        const antonioNode = encontrarNodoPorConfig(
          CABEZAS_ACTIVAS.CORPORATIVO.id,
        );
        const idAntonio = antonioNode ? antonioNode.id : null;

        // =========================================================
        // 1. CORPORATIVO (GRUPO GRIS)
        // Solo se arma si se ven todas las líneas o el filtro es CORPORATIVO.
        // =========================================================
        const groupCorpId = "GRP_CORPORATIVO";

        if (mostrarCorporativo) {
          nodesToRender.set(groupCorpId, {
            id: groupCorpId,
            pid: null,
            nombre: "CORPORATIVO",
            cargoPuesto: "CORPORATIVO",
            title: "Holding",
            tags: ["group"],
            templateName: "group",
            order: 1,
          });
        }

        if (mostrarCorporativo && idAntonio) {
          // A. Antonio (Raíz)
          const nodoAntonio = Object.assign({}, sourceMap.get(idAntonio));
          nodoAntonio.stpid = groupCorpId;
          nodoAntonio.pid = null;
          nodesToRender.set(idAntonio, nodoAntonio);

          // B. Staff de Antonio (Gerentes + SANTIAGO)
          // Buscamos manualmente a los hijos de Antonio para aplicar lógica especial a Santiago
          sourceMap.forEach((node) => {
            if (node.pid === idAntonio) {
              const lineaNode = (node.lineaNegocio || "").toUpperCase().trim();

              // Santiago (ID 12) tiene linea "CORPORATIVO", así que él SÍ pasa.
              // Juan José tiene linea "NEGOCIO RETAIL" (o similar), así que él NO pasa.
              // En "todos" se muestran Corporativo Y Derivados juntos (vista
              // combinada de siempre). Si el filtro es puntual (CORPORATIVO
              // o DERIVADOS), solo entra la gente de esa línea específica —
              // Priscilla (Derivados) no debe aparecer al filtrar Corporativo,
              // y viceversa.
              if (esTodasLineas) {
                if (lineaNode !== "CORPORATIVO" && lineaNode !== "DERIVADOS")
                  return;
              } else if (lineaNode !== lineaFiltro) {
                return;
              }

              // ¿Es este nodo cabeza funcional de alguna línea de negocio?
              // [CAMBIADO] Antes usaba ESTRUCTURA_ACTIVA.headId. Ahora usa reportFuncional
              // de CABEZAS_ACTIVAS para detectar a Santiago (ID "12") sin depender de macros.
              const esCabezaDivision = Object.values(CABEZAS_ACTIVAS).some(
                (c) => c.reportFuncional && c.reportFuncional === node.id,
              );

              // Agregamos al nodo (Santiago ID 12 entra aquí como hijo normal de Antonio)
              const nodoHijo = Object.assign({}, node);
              //nodoHijo.stpid = groupCorpId; // Va dentro del grupo gris

              if (
                nodoHijo.puesto === "COMITE" ||
                nodoHijo.puesto === "COMITE COMITE"
              ) {
                nodoHijo.nombre = "COMITÉ DE PRODUCTOS DERIVADOS";
                nodoHijo.displayNombre = "COMITÉ DE PRODUCTOS DERIVADOS"; // Lo dejamos también por si la búsqueda lo usa                  // Inyectamos las 6 líneas separadas por salto de línea (<br/>)
                nodoHijo.puesto =
                  "• PRESIDENTE\n• GERENTE GENERAL\n• GERENTE FINANCIERO\n• GERENTE DE PRODUCTOS DERIVADOS\n• TRADER SENIOR DE PRODUCTOS DERIVADOS\n• TRADER DE PRODUCTOS DERIVADOS";
                if (!nodoHijo.tags) nodoHijo.tags = [];
                nodoHijo.tags.push("comite"); // activa comiteTemplate (cuadro más alto)
                nodoHijo.tags.push("left-partner"); // cuelga a la izquierda del Presidente
              }

              // Priscilla (cabeza de Derivados): mismo estilo de header que
              // jefe-carniceria/jefe-marketing, en amarillo (color ya
              // reservado para Derivados en styles.css, GRP_DERIVADOS).
              if (lineaNode === "DERIVADOS") {
                if (!nodoHijo.tags) nodoHijo.tags = [];
                nodoHijo.tags.push("jefe-derivados");
              }

              // IMPORTANTE: Si es Santiago, usamos su ID ORIGINAL ("12") aquí arriba.
              // Esto hará que Angie ("pid": "12") se conecte a él automáticamente.
              nodesToRender.set(nodoHijo.id, nodoHijo);

              // --- C. FILTRO DE HIJOS (La clave de Angie) ---
              let filtroHijosCorp = null;

              if (esCabezaDivision) {
                // Si es Santiago, le decimos: "Solo carga a tus hijos que sean de CORPORATIVO"
                filtroHijosCorp = (n) => {
                  const linea = (n.lineaNegocio || "").toUpperCase().trim();
                  return linea === "CORPORATIVO";
                };
              }

              // Traemos la descendencia.
              // Para Santiago, esto traerá a Angie. Ignorará a Pecuario.
              // Para el resto (Gerente Financiero), trae todo normal.
              agregarDescendencia(
                nodoHijo.id,
                nodoHijo.id,
                nodesToRender,
                sourceMap,
                [],
                filtroHijosCorp,
              );
            }
          });
        }

        // --- Si es solo CORPORATIVO, salimos aquí ---
        if (esSoloCorp) {
          cargarYFinalizar(nodesToRender);
          return;
        }

        // =========================================================
        // 2. LÍNEAS DE NEGOCIO — JERARQUÍA PLANA
        // [CAMBIADO] Eliminadas las cajas de Divisiones Macro (PECUARIO, INDUSTRIAL, RETAIL).
        // Cada línea de negocio ahora cuelga directamente de groupCorpId.
        // Se eliminó: clon HEAD_MACRO_*, filtroMacro, iteración sobre ESTRUCTURA_ACTIVA.
        // Se mantiene: cerca eléctrica, ghost de Carnicería, soporte CARNICOS→CARNICERIA,
        //              clones de gerente HEAD_LINEA_*, toda la lógica anti-duplicación.
        // =========================================================

        Object.entries(CABEZAS_ACTIVAS).forEach(
          ([nombreLinea, configLinea]) => {
            // CORPORATIVO ya fue renderizado arriba
            if (nombreLinea === "CORPORATIVO") return;
            // Líneas de negocio ocultas hasta que el usuario expanda CORPORATIVO
            if (!corporativoExpandido) return;

            // Lógica de soporte: si filtro es CARNICERIA, dibujamos CARNICOS solo para sostener a Omar
            let renderizarEstaLinea = false;
            let esSoporteParaOtraLinea = false;

            if (esTodasLineas || lineaFiltro === nombreLinea) {
              renderizarEstaLinea = true;
            } else if (
              lineaFiltro === "CARNICERIA" &&
              nombreLinea === "CARNICOS"
            ) {
              renderizarEstaLinea = true;
              esSoporteParaOtraLinea = true;
            } else if (
              lineaFiltro === "MARKETING" &&
              nombreLinea === "RETAIL"
            ) {
              // Marketing cuelga del HEAD de Retail — hay que dibujar Retail
              // (solo su cabeza, como soporte) para que exista de quién colgar.
              renderizarEstaLinea = true;
              esSoporteParaOtraLinea = true;
            }
            if (!renderizarEstaLinea) return;

            const subGroupId = `GRP_${nombreLinea.replace(/\s/g, "")}`;
            const tagLinea = `LINEA_${nombreLinea.replace(/\s/g, "_")}`;

            // MARKETING cuelga del HEAD de RETAIL, no del corporativo
            // CARNICERIA cuelga de Omar Buritica (codPosicion 00097), que vive dentro de CARNICOS
            // Si no se muestra Corporativo (filtro por línea puntual), esta línea es la raíz.
            let pidDelGrupo = mostrarCorporativo ? groupCorpId : null;
            if (nombreLinea === "MARKETING") {
              const retailHead = encontrarNodoPorConfig(
                CABEZAS_ACTIVAS["RETAIL"]?.id,
              );
              if (retailHead)
                pidDelGrupo = `HEAD_LINEA_GRP_RETAIL_${retailHead.id}`;
            } else if (nombreLinea === "CARNICERIA") {
              const omarHead = encontrarNodoPorConfig(configLinea.id);
              if (omarHead) pidDelGrupo = omarHead.id;
            }

            // Grupos que conectan a GRP_CORPORATIVO usan tag groupNoLink (sin línea al padre)
            const _gruposSinLinea = [
              "BALANCEADO",
              "CARNICOS",
              "CARNICERIA",
              "PECUARIOS",
              "RETAIL",
            ];
            const _tagGrupo = _gruposSinLinea.includes(nombreLinea)
              ? "groupNoLink"
              : "group";

            // Siempre incluye "group" (para checks internos) + groupNoLink al final para override de template
            const _tagsGrupo = _gruposSinLinea.includes(nombreLinea)
              ? ["group", tagLinea, "groupNoLink"]
              : ["group", tagLinea];

            nodesToRender.set(subGroupId, {
              id: subGroupId,
              pid: pidDelGrupo,
              nombre: obtenerAliasLinea(nombreLinea),
              cargoPuesto: obtenerAliasLinea(nombreLinea),
              title: "Línea de Negocio",
              tags: _tagsGrupo,
              templateName: _gruposSinLinea.includes(nombreLinea)
                ? "groupNoLink"
                : "group",
              order: configLinea.order || 10,
            });

            // Gerente / Cabeza de la línea
            if (configLinea.id) {
              const gerenteOriginal = encontrarNodoPorConfig(configLinea.id);
              if (gerenteOriginal) {
                const idGerenteLineaVisual = `HEAD_LINEA_${subGroupId}_${gerenteOriginal.id}`;
                const nodoGerente = Object.assign({}, gerenteOriginal);

                nodoGerente.id = idGerenteLineaVisual;
                nodoGerente.stpid = subGroupId;
                nodoGerente.pid = null;

                // CARNICERIA, CARNICOS, PECUARIOS: cabeza invisible (nodo fantasma sin ancho ni alto)
                const esFantasma = [
                  "CARNICERIA",
                  "CARNICOS",
                  "PECUARIOS",
                ].includes(nombreLinea);
                if (esFantasma) {
                  nodoGerente.tags = ["fantasma"];
                  nodoGerente.template = "ghost";
                  nodoGerente.displayNombre = "";
                  nodoGerente.nombre = "";
                  nodoGerente.puesto = "";
                  nodoGerente.img = "";
                  delete nodoGerente.state;
                } else {
                  nodoGerente.displayNombre = `${gerenteOriginal.nombre} (${obtenerAliasLinea(nombreLinea)})`;
                }
                nodesToRender.set(idGerenteLineaVisual, nodoGerente);

                if (nombreLinea === "CARNICERIA") {
                  const filtroLinea = (nodo) => {
                    const lineaHijo = (nodo.lineaNegocio || "")
                      .toUpperCase()
                      .trim();
                    return (
                      lineaHijo === "CARNICERIA" ||
                      String(nodo.id).includes("CLON_")
                    );
                  };
                  agregarDescendencia(
                    idGerenteLineaVisual,
                    gerenteOriginal.id,
                    nodesToRender,
                    sourceMap,
                    [],
                    filtroLinea,
                  );
                } else {
                  // 🛡️ CERCA ELÉCTRICA: excluir empleados de Carnicería de la caja de Cárnicos
                  let idsExcluir = [];
                  if (nombreLinea === "CARNICOS") {
                    sourceMap.forEach((n) => {
                      const ln = (n.lineaNegocio || "").toUpperCase().trim();
                      if (ln === "CARNICERIA") idsExcluir.push(n.id);
                    });
                  }

                  const filtroLinea = (nodo) => {
                    const lineaHijo = (nodo.lineaNegocio || "")
                      .toUpperCase()
                      .trim();
                    if (
                      esSoporteParaOtraLinea &&
                      lineaFiltro === "CARNICERIA"
                    ) {
                      const idOmar = CABEZAS_ACTIVAS["CARNICERIA"]?.id;
                      return (
                        nodo.codPosicion === idOmar ||
                        String(nodo.id).includes(idOmar)
                      );
                    }
                    if (esSoporteParaOtraLinea && lineaFiltro === "MARKETING") {
                      const idRetail = CABEZAS_ACTIVAS["RETAIL"]?.id;
                      return (
                        nodo.codPosicion === idRetail ||
                        String(nodo.id).includes(idRetail)
                      );
                    }
                    return (
                      lineaHijo === nombreLinea ||
                      String(nodo.id).includes("CLON_")
                    );
                  };

                  const aplicarProfundo =
                    esSoporteParaOtraLinea && lineaFiltro === "CARNICERIA";
                  agregarDescendencia(
                    idGerenteLineaVisual,
                    gerenteOriginal.id,
                    nodesToRender,
                    sourceMap,
                    idsExcluir,
                    filtroLinea,
                    aplicarProfundo,
                  );
                }
              }
            }
          },
        );
        // =========================================================
        // 6. CONTEO VISUAL FINAL (Para los globos naranjas)
        // =========================================================
        const visualCounts = {};

        // A. Inicializar conteos para todas las líneas y corporativo
        Object.keys(CABEZAS_ACTIVAS).forEach((k) => {
          visualCounts[k.toUpperCase().replace(/\s/g, "")] = 0;
        });
        visualCounts["CORPORATIVO"] = 0;

        // B. [CAMBIADO] Eliminado init de Divisiones Macro. En diseño plano no existen.
        // TODO: Borrar este bloque si se confirma que el conteo plano funciona correctamente.
        // Object.values(ESTRUCTURA_ACTIVA).forEach((macro) => {
        //   visualCounts[macro.id] = 0;
        // });
        // Mantenemos init manual de DERIVADOS para que el fallback no los descarte
        visualCounts["DERIVADOS"] = 0;

        // C. Primera pasada: Contar personas en su grupo directo (stpid)
        nodesToRender.forEach((node) => {
          // --- EXCEPCIÓN DE RRHH: IGNORAR EL "COMITÉ" ---
          // Si el puesto contiene la palabra COMITE, lo ignoramos para que no sume jamás.
          const nombrePuesto = node.puesto
            ? node.puesto.toUpperCase().trim()
            : "";
          if (nombrePuesto === "COMITE" || nombrePuesto === "COMITÉ") {
            return; // Lo saltamos como si no existiera matemáticamente
          }

          // C.1 Ignoramos nodos que sean grupos o auxiliares (fantasmas)
          if (
            node.tags &&
            (node.tags.includes("group") ||
              node.tags.includes("fantasma") ||
              node.tags.includes("head-of-group")) // || node.tags.includes("vacante")) // TODO: Descomentar si piden que solo se cuenten las personas activas y no las vacantes disponibles
          )
            return;

          // C.2 Extraemos la línea de negocio real del contrato del empleado (normalizada)
          const lineaRealEmpleado = node.lineaNegocio
            ? node.lineaNegocio.trim().toUpperCase().replace(/\s/g, "")
            : "N/A";

          if (node.tags && node.tags.includes("head-of-group")) {
            // [CAMBIADO] Referencia a GRP_MACRO_DERIVADOS eliminada (no existe en diseño plano).
            // TODO: Borrar este bloque si Priscilla ya no necesita excepción de conteo.
            // if (node.stpid !== "GRP_MACRO_DERIVADOS") return;
            return; // head-of-group no cuenta en ningún diseño
          }
          // [CAMBIADO] DERIVADOS ya no tiene caja macro. Se cuenta en visualCounts["DERIVADOS"].
          // TODO: Borrar comentario si el conteo plano de DERIVADOS funciona correctamente.
          if (lineaRealEmpleado === "DERIVADOS") {
            visualCounts["DERIVADOS"]++;
            return;
          }
          // C.3 ¿Dónde está sentado visualmente este nodo ahora mismo?
          if (node.stpid) {
            // Está dentro de una caja (ej: GRP_CARNICERIA)
            const nombreCaja = node.stpid.replace("GRP_", "");
            if (nombreCaja === lineaRealEmpleado) {
              if (visualCounts[nombreCaja] !== undefined) {
                visualCounts[nombreCaja]++;
              }
            } else {
              // El empleado está de invitado en otra caja (ej. Omar Buritica en Carnicería).
              // ¡No sumamos nada! Fantasma numérico.
              // console.log(`Empleado ${node.nombre} ignorado en ${nombreCaja} porque pertenece a ${lineaRealEmpleado}`);
            }
          } else {
            // Fallback: usar su línea de negocio original si no tiene stpid (ej: staff directo raíz)
            // Está suelto (ej. Corporativo directo). Lo sumamos a su línea real.
            if (visualCounts[lineaRealEmpleado] !== undefined) {
              visualCounts[lineaRealEmpleado]++;
            }
          }
        });

        // D. [CAMBIADO] Agregación hacia Divisiones Macro eliminada. Diseño plano no la necesita.
        // TODO: Borrar este bloque completo una vez confirmado que los conteos son correctos.
        // Object.values(ESTRUCTURA_ACTIVA).forEach((macro) => {
        //   macro.subgrupos.forEach((sub) => {
        //     const subKey = sub.toUpperCase().replace(/\s/g, "");
        //     if (visualCounts[subKey]) {
        //       visualCounts[macro.id] += visualCounts[subKey];
        //     }
        //   });
        // });

        // E. ASIGNAR LOS CONTEOS A LOS NODOS DE GRUPO
        nodesToRender.forEach((node) => {
          if (node.tags && node.tags.includes("group")) {
            // Caso 1: Es una División Macro (Pecuario/Retail)
            if (visualCounts[node.id] !== undefined) {
              node.conteo = String(visualCounts[node.id]);
            }
            // Caso 2: Es una Línea de Negocio Individual o Corporativo
            else {
              const lineaKey = node.id.replace("GRP_", "");
              if (visualCounts[lineaKey] !== undefined) {
                node.conteo = String(visualCounts[lineaKey]);
              }
            }
          }
        });

        console.log(
          "📊 Conteos Visuales Finales (Personas Únicas):",
          visualCounts,
        );

        // console.log("📊 nodesToRender.size:", nodesToRender.size);

        // Disparar renderizado final
        cargarYFinalizar(nodesToRender);
      }

      function cargarYFinalizar(nodesToRender) {
        const finalArray = Array.from(nodesToRender.values());

        // CARNICERIA: GRP_CARNICERIA (hijo de Omar, pid=4673) desplaza a los jefes hermanos.
        // Fix: eliminar GRP_CARNICERIA y HEAD_LINEA_GRP_CARNICERIA. Mover el nodo persona de
        // Jean Pierre directamente a pid=4673 (mismo nivel que 9108/4492/2673) con jefe-carniceria.
        (function() {
          const grpIdx = finalArray.findIndex(n => n.id === 'GRP_CARNICERIA');
          const headCarniceria = finalArray.find(n => String(n.id).startsWith('HEAD_LINEA_GRP_CARNICERIA_'));
          if (grpIdx !== -1 && headCarniceria) {
            const grpNode = finalArray[grpIdx];
            finalArray.splice(grpIdx, 1); // quitar GRP_CARNICERIA

            // Jean Pierre: el nodo persona hijo directo del HEAD (no fantasma)
            const jeanPierre = finalArray.find(n =>
              String(n.pid) === String(headCarniceria.id) &&
              !(n.tags || []).includes('fantasma')
            );
            if (jeanPierre) {
              jeanPierre.pid = grpNode.pid;  // 4673 (Omar) — mismo nivel que demás jefes
              jeanPierre.stpid = null;
              jeanPierre.order = grpNode.order;
              // Mismo sub-level que 9108/4492/2673 + template propio con header CARNICERÍA
              jeanPierre.tags = ['level-5', 'sub-level-1', 'sublevel-node', 'jefe-carniceria'];
              delete jeanPierre.displayNombre;
            }

            // Eliminar HEAD (ya no es necesario, Jean Pierre va directo a Omar)
            const headIdx = finalArray.findIndex(n => String(n.id).startsWith('HEAD_LINEA_GRP_CARNICERIA_'));
            if (headIdx !== -1) finalArray.splice(headIdx, 1);
          }
        })();

        // MARKETING: a diferencia de CARNICERIA, el HEAD_LINEA_GRP_MARKETING *es* el jefe
        // (no es fantasma). Solo eliminar GRP_MARKETING y promover el HEAD directamente
        // a pid=HEAD_LINEA_GRP_RETAIL, añadiendo tag jefe-marketing para el template morado.
        (function() {
          const grpIdx = finalArray.findIndex(n => n.id === 'GRP_MARKETING');
          const headMktIdx = finalArray.findIndex(n => String(n.id).startsWith('HEAD_LINEA_GRP_MARKETING_'));
          const retailHead = finalArray.find(n => String(n.id).startsWith('HEAD_LINEA_GRP_RETAIL_'));
          if (grpIdx !== -1 && headMktIdx !== -1 && retailHead) {
            finalArray.splice(grpIdx, 1); // quitar GRP_MARKETING

            // Re-buscar HEAD después del splice (índice puede haber cambiado)
            const headMarketing = finalArray.find(n => String(n.id).startsWith('HEAD_LINEA_GRP_MARKETING_'));
            if (headMarketing) {
              headMarketing.pid = retailHead.id;   // promover: cuelga del head de RETAIL
              headMarketing.stpid = null;           // ya no pertenece a ningún grupo
              delete headMarketing.order;             // orden por jerarquía API, no forzado
              const existingTags = (headMarketing.tags || []).filter(
                t => !/^(group|groupNoLink|head-of-group|fantasma)$/.test(t)
              );
              headMarketing.tags = [...existingTags, 'jefe-marketing'];
              delete headMarketing.displayNombre;   // usa nombre real del nodo
            }
          }
        })();

        // Contadores (_directos/_total) se calculan DESPUÉS de las
        // reestructuraciones de arriba (fusión Carnicería, promoción
        // Marketing bajo Retail) — si se calculan antes, no reflejan el
        // árbol final (ej. Retail mostraba "1" en vez de contar también
        // a Marketing y su gente, porque el pid todavía no se había
        // reasignado).
        if (typeof calcularDescendenciaManual === "function") {
          calcularDescendenciaManual(finalArray);
        }

        // RETAIL & BALANCEADO: sus HEAD son personas reales (no fantasma) → aparecen en fila 1
        // del grupo mientras PECUARIOS/CARNICOS tienen fantasma y sus hijos reales en fila 2.
        // Fix: insertar un nodo fantasma encima de cada HEAD para alinear todas las cabezas reales
        // en la misma fila vertical.
        (function() {
          ['RETAIL', 'BALANCEADO'].forEach(function(linea) {
            const headNode = finalArray.find(n => String(n.id).startsWith('HEAD_LINEA_GRP_' + linea + '_'));
            if (!headNode || !headNode.stpid) return;
            const fantasmaId = 'FANTASMA_HEAD_GRP_' + linea;
            finalArray.push({
              id: fantasmaId,
              stpid: headNode.stpid,  // hereda el grupo (GRP_RETAIL / GRP_BALANCEADO)
              pid: null,
              tags: ['fantasma'],
              template: 'ghost',
              nombre: '',
              puesto: '',
              img: '',
              displayNombre: '',
            });
            headNode.stpid = null;
            headNode.pid = fantasmaId;
            // Effective FANTASMA nivel = 2 (same as CARNICOS/PECUARIOS FANTASMAs).
            // Compute correct sub-level so head aligns with same-nivel nodes in other groups.
            const headSubLevel = Math.max(0, (headNode.order || 0) - 2 - 1);
            const newTags = (headNode.tags || [])
              .filter(t => !/^sub-level-\d+$/.test(t) && t !== 'sublevel-node')
              .concat([`sub-level-${headSubLevel}`]);
            if (headSubLevel > 0) newTags.push('sublevel-node');
            headNode.tags = newTags;
          });
        })();

        // AGREGAR ESTO: Asegurar displayNombre en todos los nodos
        finalArray.forEach((node) => {
          if (!node.displayNombre) {
            node.displayNombre = node.nombre || node.cargoPuesto || "";
          }
          // (Esto debería estar por defecto, pero lo forzamos por si acaso)
          if (!node.id) {
            console.error("❌ Nodo sin ID:", node);
          }
        });

        // ✅ DETECTAR MODO
        const currentMode = document.getElementById("modo-select").value;
        const esCargo = currentMode === "Cargo";

        finalArray.forEach((node) => {
          if (
            node.tags &&
            (node.tags.includes("group") || node.tags.includes("fantasma") || node.tags.includes("jefe-carniceria") || node.tags.includes("jefe-marketing") || node.tags.includes("jefe-derivados"))
          )
            return;

          const directos = node._directos || 0;
          const total = node._total || 0;
          const esVacante = node.tags && node.tags.includes("vacante");
          const esComite = node.tags && node.tags.includes("comite"); // ⭐ Detectamos si es el comité

          if (directos > 0) {
            if (directos === total) {
              if (directos === 1)
                // ✅ En cargo usar cargoSingle, en persona usar fichaSingle
                node.tags.push(
                  esVacante
                    ? "vacanteSingle"
                    : esCargo
                      ? "cargoSingle"
                      : "fichaSingle",
                );
              else
                node.tags.push(
                  esVacante
                    ? "vacanteGroup"
                    : esCargo
                      ? "cargoGroup"
                      : "fichaGroup",
                );
            } else {
              node.tags.push(
                esVacante
                  ? "vacanteComplex"
                  : esCargo
                    ? "cargoComplex"
                    : "fichaComplex",
              );
            }
          } else {
            if (esVacante) node.tags.push("vacanteSimple");
            else if (esComite) node.tags.push("comiteTemplate"); // El comité si no tiene hijos visibles
          }
        });

        console.log(`✅ Renderizando Filtrado: ${finalArray.length} nodos.`);

        // ✅ LIMPIAR estado interno de Balkan nodo por nodo
        // (esto evita que recuerde expansiones manuales previas)
        // ✅ Siempre limpiar estado interno de Balkan
        finalArray.forEach((node) => {
          delete node.state;
          node.expanded = false; // ← Explícito, no solo delete
          // node.collapsed en null hace que Balkan caiga a su estado interno
          // RECORDADO por ID entre renders (ej. "Expandir Todo" en Todas las
          // Líneas deja a Antonio/Priscilla/los gerentes de Cárnicos — ids
          // reales, estables entre filtros — marcados como expandidos
          // internamente, y ese registro sobrevive al cambio de filtro aunque
          // se borre `.state`). Forzar collapsed:true explícito en TODOS los
          // nodos hace que _setCollpasedProperty ya no tenga ambigüedad que
          // resolver con el registro viejo; nodosAExpandir sigue revelando lo
          // que corresponde vía el ancestor-walk de expand.nodes.
          node.collapsed = true;
        });

        // ✅ SIEMPRE setear expand/collapse antes de cargar
        const lineaFiltro = ($("#linea-negocio-select").val() || "")
          .toUpperCase()
          .trim();
        const hayFiltroEspecifico = lineaFiltro !== "TODOS";

        // LISTA DE NODOS A EXPANDIR (incluye fantasmas)
        // [CAMBIADO] Eliminados GRP_MACRO_* (no existen en diseño plano).
        // TODO: Borrar IDs comentados si se confirma que el diseño plano es definitivo.
        const nodosAExpandir = [
          "GRP_CORPORATIVO",
          // "GRP_MACRO_PECUARIO",    // Eliminar, no existe en diseño plano
          // "GRP_MACRO_INDUSTRIAL",  // Eliminar, no existe en diseño plano
          // "GRP_MACRO_DERIVADOS",   // Eliminar, no existe en diseño plano
          // "GRP_MACRO_INMOBILIARIA",// Eliminar, no existe en diseño plano
          // "GRP_MACRO_RETAIL",      // Eliminar, no existe en diseño plano
          "GRP_PECUARIOS",
          "GRP_CARNICOS",
          "GRP_DERIVADOS",
          "GRP_BALANCEADO",
          "GRP_RETAIL",
          "GRP_MARKETING",
        ];

        // AGREGAR TODOS LOS FANTASMAS DINÁMICAMENTE
        finalArray.forEach((node) => {
          if (node.tags && node.tags.includes("fantasma")) {
            if (
              String(node.id).includes("CARNICERIA") &&
              lineaFiltro !== "CARNICERIA"
            ) {
              return;
            }
            nodosAExpandir.push(node.id);
          }
        });

        // 🧠 EXCEPCIÓN VIP EXCLUSIVA PARA CARNICERÍA
        // Si hay un filtro específico (como 'PECUARIOS' o 'GRANJAS AVÍCOLAS'), forzamos su nodo de grupo a expandirse.
        if (hayFiltroEspecifico) {
          // El ID del nodo de grupo es GRP_ + el valor del filtro (reemplazando espacios por guiones bajos)
          // Ej: "PECUARIOS" -> "GRP_PECUARIOS", "GRANJAS AVÍCOLAS" -> "GRP_GRANJAS_AVÍCOLAS"
          const grpId = `GRP_${lineaFiltro.replace(/\s+/g, "_")}`;
          const macroGrpId = `GRP_MACRO_${lineaFiltro.replace(/\s+/g, "_")}`;

          // 1. Si es una Línea normal (Ej. PECUARIOS) — siempre entra aquí en diseño plano
          if (finalArray.some((n) => n.id === grpId)) {
            nodosAExpandir.push(grpId);
          }

          // 1.1 Al filtrar por una línea puntual, su cabeza siempre sale
          // visible — excepto CORPORATIVO y CARNICOS, que no usan este
          // patrón HEAD_LINEA_*. Sus reportes directos (el "1 nivel
          // expandido") solo se revelan para las líneas donde eso es lo
          // esperado — CARNICERIA, DERIVADOS y MARKETING se muestran SOLO
          // hasta la cabeza, sin auto-expandir sus reportes.
          if (lineaFiltro !== "CORPORATIVO" && lineaFiltro !== "CARNICOS") {
            const prefijoCabezaLinea = `HEAD_LINEA_${grpId}_`;
            const nodoCabezaLinea = finalArray.find((n) =>
              String(n.id).startsWith(prefijoCabezaLinea),
            );
            if (nodoCabezaLinea) {
              // El array declarativo expand.nodes camina hacia ARRIBA desde
              // cada id listado (nunca hacia abajo) para saltarse el límite
              // de collapse.level=0 fijado en el init del chart — esto es lo
              // que hace visible a la cabeza misma, con o sin sus hijos.
              nodosAExpandir.push(nodoCabezaLinea.id);

              const revelarHijosDeLaCabeza =
                lineaFiltro !== "CARNICERIA" &&
                lineaFiltro !== "DERIVADOS" &&
                lineaFiltro !== "MARKETING";
              if (revelarHijosDeLaCabeza) {
                nodoCabezaLinea.expanded = true;
                // Hay que listar también a los HIJOS de la cabeza
                // explícitamente — si no, quedan bloqueados por
                // collapse.level=0 aunque su propio dato diga collapsed:false.
                finalArray
                  .filter((n) => String(n.pid) === String(nodoCabezaLinea.id))
                  .forEach((hijo) => nodosAExpandir.push(hijo.id));
              }
            }
          }

          // DERIVADOS: no tiene caja/HEAD_LINEA_* propio (vive como gente
          // suelta bajo Antonio, con lineaNegocio "DERIVADOS"). Priscilla ya
          // sale visible por ser hija directa de Antonio (postCargaConReintento
          // expande sus hijos vía corporativoExpandido) — igual que
          // CORPORATIVO/CARNICOS/CARNICERIA/MARKETING, se muestra solo hasta
          // su cabeza, sin revelar sus reportes directos.

          // 2. [CAMBIADO] Rama de División Macro deshabilitada. En diseño plano no existen GRP_MACRO_*.
          // TODO: Borrar este bloque completo cuando se confirme que el diseño plano es definitivo.
          // else if (finalArray.some(n => n.id === macroGrpId)) {
          //     nodosAExpandir.push(macroGrpId);
          //     const prefijoCabeza = `HEAD_MACRO_${macroGrpId}_`;
          //     const nodoCabeza = finalArray.find(n => String(n.id).startsWith(prefijoCabeza));
          //     if (nodoCabeza) {
          //         nodosAExpandir.push(nodoCabeza.id);
          //         nodoCabeza.expanded = true;
          //     }
          // }
        }

        if (
          focusState &&
          focusState.nodosAbiertos &&
          focusState.nodosAbiertos.length > 0
        ) {
          nodosAExpandir.push(...focusState.nodosAbiertos);
        }

        // Líneas de reporte visual: se inyectan en el evento render (no via chart.config.slinks)
        // chart.config.slinks causa crash en _setPositions cuando Santiago aún no tiene posición.
        const antonioParaSlink = finalArray.find(
          (n) =>
            n.stpid === "GRP_CORPORATIVO" &&
            !n.tags?.includes("comite") &&
            !n.tags?.includes("left-partner"),
        );
        antonioId = antonioParaSlink ? String(antonioParaSlink.id) : null;
        _slinksManuales = [];
        if (antonioParaSlink) {
          // Antonio en nodosAExpandir solo cuando corporativoExpandido (sus hijos deben verse al re-render)
          if (
            corporativoExpandido &&
            !nodosAExpandir.includes(antonioParaSlink.id)
          ) {
            nodosAExpandir.push(antonioParaSlink.id);
          }
          if (finalArray.some((n) => n.id === "GRP_RETAIL")) {
            _slinksManuales.push({
              from: antonioParaSlink.id,
              to: "GRP_RETAIL",
              color: "#27ae60",
              laneOffset: 40,
              routeRight: true,
            });
          }
          const idSantiago = "12";
          ["GRP_BALANCEADO", "GRP_CARNICOS", "GRP_PECUARIOS"].forEach(
            (grpId) => {
              if (finalArray.some((n) => n.id === grpId)) {
                let toId = grpId;
                if (grpId !== "GRP_BALANCEADO") {
                  const headPrefix = `HEAD_LINEA_${grpId}_`;
                  const headNode = finalArray.find((n) =>
                    String(n.id).startsWith(headPrefix),
                  );
                  if (headNode) toId = headNode.id;
                }
                _slinksManuales.push({
                  from: idSantiago,
                  to: toId,
                  fallbackTo: grpId,
                  color: "#E74C3C",
                  laneOffset: 70,
                  routeLeft: true,
                });
              }
            },
          );
          // GRP_CARNICERIA: línea visible desde Omar Buritica (pid del grupo ya apunta a él)
          if (finalArray.some((n) => n.id === "GRP_CARNICERIA")) {
            const omarNode = finalArray.find(
              (n) =>
                n.codPosicion === "00097" &&
                !String(n.id).includes("HEAD_") &&
                !String(n.id).includes("GRP_") &&
                !String(n.id).includes("CLON_"),
            );
            if (omarNode)
              _slinksManuales.push({ from: omarNode.id, to: "GRP_CARNICERIA" });
          }
          // GRP_MARKETING: línea visible desde el HEAD de RETAIL (su pid ya apunta a él)
          if (finalArray.some((n) => n.id === "GRP_MARKETING")) {
            const retailHeadNode = finalArray.find((n) =>
              String(n.id).startsWith("HEAD_LINEA_GRP_RETAIL_"),
            );
            if (retailHeadNode)
              _slinksManuales.push({
                from: retailHeadNode.id,
                to: "GRP_MARKETING",
              });
          }
        }
        chart.config.slinks = [];

        // ❌ ELIMINAMOS EL allChildren: true.
        // Ahora, haya filtro o no, siempre respetará el Nivel 1, pero forzaremos las excepciones que definimos arriba.
        chart.config.expand = {
          nodes: nodosAExpandir,
          allChildren: false,
        };
        chart.config.collapse = {
          level: 2,
          allChildren: true,
        };

        // Ordenar hijos de RETAIL HEAD por posición en allNodes (orden API).
        // jefe-marketing no entra — su order es el original del API.
        const _retailHead = finalArray.find((n) =>
          String(n.id).startsWith("HEAD_LINEA_GRP_RETAIL_"),
        );
        if (_retailHead) {
          const _retailSiblings = finalArray.filter(
            (n) =>
              String(n.pid) === String(_retailHead.id) &&
              n.id !== "GRP_MARKETING",
          );
          _retailSiblings.sort((a, b) => {
            const ia = allNodes.findIndex((n) => String(n.id) === String(a.id));
            const ib = allNodes.findIndex((n) => String(n.id) === String(b.id));
            return ia - ib;
          });
          _retailSiblings.forEach((n, idx) => {
            n.order = idx; // orden relativo entre hermanos, base 0
          });
        }

        // Preset de collapsed A NIVEL DE DATOS, antes de cargar. Evita
        // depender de llamadas chart.expand()/collapse() post-load, cuyo
        // efecto no es confiable cuando el usuario usó "Expandir Todo"
        // antes (Balkan arrastra estado por ID entre renders). Con el
        // valor ya explícito en cada nodo, chart.load() no tiene ambigüedad:
        // _setCollpasedProperty solo aplica su default si collapsed es null.
        // ⚠️ El array declarativo expand.nodes (nodosAExpandir) camina hacia
        // ARRIBA desde cada id listado para saltarse el límite real de
        // collapse.level=0 (fijado en el init del chart — reasignarlo
        // post-init es un no-op, ver 03 - Estado Actual.md). Setear
        // node.collapsed en la data NO ALCANZA por sí solo: hay que listar
        // también cada hijo a revelar en nodosAExpandir explícitamente,
        // el caso genérico (Balanceado/Retail) ya lo hace arriba en el
        // bloque "EXCEPCIÓN VIP". Acá cubrimos PECUARIOS, que no pasa por
        // ese bloque (su HEAD_LINEA_* real no existe igual), y Jean Pierre
        // (Carnicería): su fusión bajo Omar no deja rastro HEAD_LINEA_*, así
        // que el bloque "EXCEPCIÓN VIP" no puede encontrarlo — se revela acá
        // por tag, SOLO él (sin sus reportes directos).
        (function revelarHijosCasosEspeciales() {
          if (lineaFiltro === "PECUARIOS") {
            const fantasma = finalArray.find((n) =>
              String(n.id).startsWith("HEAD_LINEA_GRP_PECUARIOS_"),
            );
            if (fantasma) {
              finalArray
                .filter((n) => String(n.pid) === String(fantasma.id))
                .forEach((cabeza) => {
                  finalArray
                    .filter((n) => String(n.pid) === String(cabeza.id))
                    .forEach((n) => nodosAExpandir.push(n.id));
                });
            }
          } else if (lineaFiltro === "CARNICERIA") {
            const jeanPierre = finalArray.find(
              (n) => n.tags && n.tags.includes("jefe-carniceria"),
            );
            if (jeanPierre) nodosAExpandir.push(jeanPierre.id);
          }
        })();

        // Confirmado por consola: node.collapsed:true en la DATA no pisa el
        // estado interno que Balkan ya tenía guardado para ese id (ej. tras
        // "Expandir Todo" en Todas las Líneas, Omar/Antonio/Priscilla —
        // ids reales y estables entre filtros — quedan con collapsed:false
        // en runtime aunque la data diga true). chart.load([]) vacío destruye
        // el registro interno por id antes de recargar — mismo patrón ya
        // usado en el botón "Colapsar Todo".
        chart.load([]);
        chart.load(finalArray);

        // Balkan puede tardar en inicializar su registro interno de nodos
        // (más en pestañas en segundo plano, donde Chrome ralentiza los
        // timers) — chart.getNode() truena internamente en ese caso (no
        // devuelve null, lanza excepción), lo que aborta esta función ANTES
        // de llamar a expandirFantasmas(), dejando las cajas de línea sin
        // dibujar. Reintentamos con backoff en vez de fallar en silencio.
        function postCargaConReintento(intentosRestantes) {
          try {
            if (corporativoExpandido && antonioId) {
              const antonioNode = chart.getNode(antonioId);
              if (
                antonioNode &&
                antonioNode.childrenIds &&
                antonioNode.childrenIds.length > 0
              ) {
                chart.expandCollapse(
                  antonioId,
                  antonioNode.childrenIds,
                  [],
                  function () {
                    expandirFantasmas();
                  },
                );
              } else {
                expandirFantasmas();
              }
            } else {
              expandirFantasmas();
            }
          } catch (e) {
            if (intentosRestantes > 0) {
              console.warn(
                "postCarga: chart aún no listo, reintentando...",
                e,
              );
              setTimeout(
                () => postCargaConReintento(intentosRestantes - 1),
                75,
              );
            } else {
              console.error(
                "postCarga: chart no quedó listo tras varios intentos",
                e,
              );
              // Mejor intentar dibujar fantasmas/líneas igual que dejar todo en blanco.
              try {
                expandirFantasmas();
              } catch (e2) {
                console.error("expandirFantasmas también falló:", e2);
              }
            }
          }
        }
        setTimeout(() => postCargaConReintento(6), 10);
        // setTimeout(() => chart.fit(), 50);

        loaderOverlay.classList.remove("visible");
      }

      // REEMPLAZAR FUNCIÓN COMPLETA
      function expandirFantasmas() {
        const lineaFiltro = ($("#linea-negocio-select").val() || "")
          .toUpperCase()
          .trim();

        // El "1 nivel expandido" de la cabeza de línea (Balanceado, Retail,
        // Marketing, Pecuarios, Carnicería) ya se resuelve a nivel de datos
        // en cargarYFinalizar() (presetCollapsedPorFiltro), antes de
        // chart.load(). No repetirlo acá con chart.expand() imperativo —
        // eso es lo que causaba que quedara todo expandido si el usuario
        // había usado "Expandir Todo" antes (Balkan arrastra estado por ID
        // entre renders y las llamadas imperativas post-load no son
        // confiables para revertir eso).

        const fantasmas = chart.config.nodes
          .filter((n) => {
            if (!n.tags || !n.tags.includes("fantasma")) return false;
            // No forzamos la animación si es Carnicería y estamos en la vista general
            if (
              String(n.id).includes("CARNICERIA") &&
              lineaFiltro !== "CARNICERIA"
            )
              return false;
            return true;
          })
          .map((n) => n.id);

        if (fantasmas.length === 0) {
          // Sin fantasmas en esta vista (ej. filtro CORPORATIVO, solo gente
          // real) — igual hay que ajustar el zoom a lo recién expandido.
          setTimeout(() => chart.fit(), 200);
          return;
        }

        chart.expand(null, fantasmas, () => {
          fantasmas.forEach((ghostId) => {
            const ghostNode = chart.getNode(ghostId);
            if (ghostNode?.childrenIds?.length > 0) {
              chart.expand(ghostId, ghostNode.childrenIds);
            }
          });
          setTimeout(() => chart.fit(), 200);
        });
      }
      // Función recursiva para agregar hijos con filtros
      // idVisualPadre: El ID del nodo padre en el gráfico (puede ser clon o real)
      // idOriginalPadre: El ID real en la data (para buscar quién le reporta de verdad)
      // nodesToRender: El mapa donde guardamos los nodos a dibujar
      // sourceMap: La data original
      // idsAExcluir: Lista negra de IDs que no queremos dibujar en esta rama
      // filtroEstricto: Función opcional. Si devuelve FALSE, el hijo se ignora.
      function agregarDescendencia(
        idVisualPadre,
        idOriginalPadre,
        nodesToRender,
        sourceMap,
        idsAExcluir = [],
        filtroEstricto = null,
        filtroProfundo = false, // NUEVO: Bandera para heredar el filtro
      ) {
        // Si no especificamos original, es el mismo que el visual
        const idBusqueda = idOriginalPadre || idVisualPadre;

        sourceMap.forEach((node) => {
          // ¿El nodo le reporta a este jefe?
          if (node.pid === idBusqueda) {
            // 1. Chequeo de lista negra
            if (idsAExcluir.includes(node.id)) return;

            // 2. Filtro Lógico (Aquí es donde separamos a Angie del resto)
            if (filtroEstricto && !filtroEstricto(node)) return;

            // Si pasa las pruebas, lo agregamos
            if (!nodesToRender.has(node.id)) {
              const nodoHijo = Object.assign({}, node);

              // Si el padre visual es un clon, actualizamos el pid del hijo
              if (idVisualPadre !== idOriginalPadre) {
                nodoHijo.pid = idVisualPadre;
              }

              nodesToRender.set(nodoHijo.id, nodoHijo);

              // Recursividad: Buscamos a los hijos de este hijo (nietos)
              // Nota: A los nietos ya NO les aplicamos el filtro estricto del abuelo.
              // Ejemplo: Los asistentes de Angie deben salir con Angie, sin importar si son "Corp" o no.
              agregarDescendencia(
                nodoHijo.id,
                nodoHijo.id,
                nodesToRender,
                sourceMap,
                idsAExcluir,
                filtroProfundo ? filtroEstricto : null, // Se hereda si es profundo
                filtroProfundo,
              );
            }
          }
        });
      }

      ///////// * Reconstruye el árbol manteniendo la jerarquía de los padres.
      function aplicarFiltrosJerarquicos() {
        if (!chart) return;

        const currentMode = document.getElementById("modo-select").value;
        const sourceNodes = currentMode === "Cargo" ? allCargoNodes : allNodes;

        if (!sourceNodes.length) {
          chart.load([]);
          return;
        }

        // 1. Obtener filtros
        const selectedLinea = $("#linea-negocio-select").val();
        const selectedCosto = $("#centro-costos-select").val();
        const selectedProposito = $("#proposito-select").val();

        if (!selectedLinea || !selectedCosto || !selectedProposito) {
          chart.load([]);
          return;
        }

        console.log(
          `Filtrando: L:${selectedLinea} | C:${selectedCosto} | P:${selectedProposito}`,
        );

        // 2. Mapa Global
        const fullNodeMap = new Map(sourceNodes.map((n) => [n.id, n]));

        // 3. NÚCLEO: Coincidencia exacta
        const exactMatches = sourceNodes.filter((n) => {
          const matchLinea = n.lineaNegocio === selectedLinea;

          // Corrección para Costo
          const matchCosto =
            selectedCosto === "todos" || n.centroCosto === selectedCosto;

          // Si es "todos", devuelve true. Si no, compara.
          const matchProposito =
            selectedProposito === "todos" || n.proposito === selectedProposito;

          return matchLinea && matchCosto && matchProposito;
        });

        if (exactMatches.length === 0) {
          chart.load([]);
          loaderOverlay.classList.remove("visible");
          return;
        }

        // 4. RECONSTRUCCIÓN DE JERARQUÍA
        const finalNodesMap = new Map();

        const addNodeWithAncestors = (node) => {
          finalNodesMap.set(node.id, node);
          if (node.pid) {
            const parentNode = fullNodeMap.get(node.pid);
            if (parentNode) {
              const isSameLine = parentNode.lineaNegocio === selectedLinea;
              if (isSameLine) {
                addNodeWithAncestors(parentNode);
              }
            }
          }
        };

        exactMatches.forEach((node) => {
          addNodeWithAncestors(node);
        });

        // 5. IDENTIFICAR AL "LÍDER LOCAL"
        const finalNodesList = Array.from(finalNodesMap.values());
        finalNodesList.sort((a, b) => (a.order || 99) - (b.order || 99));

        if (finalNodesList.length === 0) {
          chart.load([]);
          return;
        }

        const localMainBoss = finalNodesList[0];
        console.log("Líder Local:", localMainBoss.nombre);

        // ------------------------------------------------------------------
        // 5.5 NUEVO: RESCATAR JEFES SUPERIORES
        // ------------------------------------------------------------------
        const upperBossesMap = new Map();

        const addUpperAncestors = (node) => {
          if (node.pid) {
            const parentNode = fullNodeMap.get(node.pid);

            // --- MODIFICACIÓN SOLICITADA: FRENO EN EL PRESIDENTE ---
            // Si el propósito NO es "todos" (ej: Sistemas) y el padre es el Presidente...
            // DETENEMOS LA BÚSQUEDA. No lo agregamos.
            if (
              selectedLinea !== "CORPORATIVO" &&
              parentNode &&
              String(parentNode.codPosicion) === "00001"
            ) {
              return;
            }
            // -------------------------------------------------------

            if (
              parentNode &&
              !finalNodesMap.has(parentNode.id) &&
              !upperBossesMap.has(parentNode.id)
            ) {
              upperBossesMap.set(parentNode.id, parentNode);
              addUpperAncestors(parentNode);
            }
          }
        };

        addUpperAncestors(localMainBoss);

        // Unimos los mapas
        const allRenderNodesMap = new Map([
          ...finalNodesMap,
          ...upperBossesMap,
        ]);

        // Buscamos quién es el VERDADERO Root ahora
        const allRenderList = Array.from(allRenderNodesMap.values());
        allRenderList.sort((a, b) => (a.order || 99) - (b.order || 99));
        const absoluteRoot = allRenderList[0];

        // ------------------------------------------------------------------

        // 6. CLASIFICACIÓN FINAL Y RENDERIZADO
        const nodesToRender = new Map();
        const servicesToGroup = [];

        // Detección de Caso Especial (Corporativo + Todos)
        const isCorpTodos =
          selectedLinea === "CORPORATIVO" &&
          selectedCosto === "CORPORATIVO" &&
          selectedProposito === "todos";

        const isConnectedToRoot = (nodeId) => {
          if (nodeId === absoluteRoot.id) return true;
          let curr = allRenderNodesMap.get(nodeId);
          while (curr && curr.pid) {
            if (curr.pid === absoluteRoot.id) return true;
            if (allRenderNodesMap.has(curr.pid)) {
              curr = allRenderNodesMap.get(curr.pid);
            } else {
              return false;
            }
          }
          return false;
        };

        for (const node of allRenderList) {
          if (node.id === absoluteRoot.id) {
            const root = Object.assign({}, node);
            root.pid = null;
            nodesToRender.set(root.id, root);
            continue;
          }

          if (isConnectedToRoot(node.id)) {
            nodesToRender.set(node.id, node);
          } else {
            // Si está desconectado:
            if (isCorpTodos) {
              // EXCEPCIÓN: Conectar al Presidente en modo TODOS
              const forcedNode = Object.assign({}, node);
              forcedNode.pid = absoluteRoot.id;
              nodesToRender.set(forcedNode.id, forcedNode);
            } else {
              // Normal: Es servicio
              servicesToGroup.push(node);
            }
          }
        }

        // 7. CREAR GRUPOS
        if (servicesToGroup.length > 0) {
          const bossForGroups = nodesToRender.has(localMainBoss.id)
            ? localMainBoss
            : absoluteRoot;
          const ghostId = `GHOST_${bossForGroups.id}`;
          const ghostNode = {
            id: ghostId,
            pid: bossForGroups.id,
            tags: ["fantasma", "assistant", "assistant-branch"],
            nombre: "",
          };
          nodesToRender.set(ghostId, ghostNode);

          const groupsMap = {};
          servicesToGroup.forEach((emp) => {
            let groupName = emp.departamento || emp.proposito || "SERVICIOS";
            groupName = groupName.trim().toUpperCase();
            if (!groupsMap[groupName]) groupsMap[groupName] = [];
            groupsMap[groupName].push(emp);
          });

          Object.keys(groupsMap).forEach((groupName) => {
            const employees = groupsMap[groupName];
            const groupId = `GRP_${groupName.replace(/[^a-zA-Z0-9]/g, "")}_${Math.floor(Math.random() * 1000)}`;
            const groupNode = {
              id: groupId,
              pid: ghostId,
              nombre: groupName,
              title: `${employees.length} Colaboradores`,
              tags: ["group"],
              templateName: "group",
            };
            nodesToRender.set(groupId, groupNode);

            employees.forEach((emp) => {
              const empClone = Object.assign({}, emp);
              empClone.pid = null;
              empClone.stpid = groupId;
              nodesToRender.set(empClone.id, empClone);
            });
          });
        }

        // 8. Cargar
        const finalArray = Array.from(nodesToRender.values());
        //chart.config.collapse = { level: 3, allChildren: true };

        if (finalArray.length > 0) {
          chart.load(finalArray);
          setTimeout(() => expandirFantasmas(), 10);
          setTimeout(() => chart.fit(), 50);
        } else {
          chart.load([]);
        }
        loaderOverlay.classList.remove("visible");
      }

      // Función recursiva para calcular hijos y nietos
      function calcularDescendenciaManual(nodes) {
        // 1. Convertir array a mapa para acceso rápido
        const map = {};
        nodes.forEach((n) => (map[n.id] = n));

        // 2. Agrupar hijos por padre
        const childrenMap = {};
        nodes.forEach((n) => {
          if (n.pid) {
            if (!childrenMap[n.pid]) childrenMap[n.pid] = [];
            childrenMap[n.pid].push(n.id);
          }
        });

        // 3. Función recursiva para contar
        function getTotals(nodeId) {
          let total = 0;
          const children = childrenMap[nodeId] || [];
          // Guardamos los directos
          if (map[nodeId]) map[nodeId]._directos = children.length;

          // Sumamos recursivamente
          total += children.length;
          children.forEach((childId) => {
            total += getTotals(childId) - (map[childId]._directos || 0); // Ajuste matemático simple: sumamos la rama completa
            // Corrección simplificada:
            // El total de un nodo es la suma de (1 + total de descendientes) de cada hijo.
            // Pero para hacerlo fácil:
          });
          return total;
        }

        // RE-CALCULO MÁS ROBUSTO Y SIMPLE
        // Iteramos al revés (desde el nivel más bajo hacia arriba) o recursivo simple
        const getDeepCount = (nid) => {
          const kids = childrenMap[nid] || [];
          let sum = 0;
          kids.forEach((kidId) => {
            sum += 1 + getDeepCount(kidId); // 1 (el hijo) + sus descendientes
          });
          return sum;
        };

        nodes.forEach((node) => {
          node._directos = (childrenMap[node.id] || []).length;
          node._total = getDeepCount(node.id);
        });
      }

      // --- Función Principal: Cargar, Mapear y Renderizar ---
      async function loadAndRenderChart(apiUrl) {
        loaderOverlay.classList.add("visible");
        loaderText.innerText = "Cargando Organigrama...";
        // Resetea el spinner y el color por si hubo un error antes
        loaderText.style.color = "#555";
        loaderOverlay.querySelector(".loader-spinner").style.display = "block";
        treeDiv.innerHTML = "";

        try {
          // 1. Fetch API
          console.log("Iniciando fetch a:", apiUrl);
          const response = await fetch(apiUrl);
          if (!response.ok)
            throw new Error(
              `Error HTTP ${response.status}: ${response.statusText}`,
            );
          console.log(`API respondió (${response.status}). Procesando...`);
          const apiResponse = await response.json();
          const flatApiData = Array.isArray(apiResponse?.Persona)
            ? apiResponse.Persona
            : null;
          if (!Array.isArray(flatApiData))
            throw new Error(
              "Formato inválido. No se encontró array en 'Persona'.",
            );
          if (flatApiData.length === 0) {
            loaderText.innerText = "API OK, pero no hay datos.";
            return;
          }
          //loaderText.innerText = `Datos recibidos (${flatApiData.length}). Procesando...`;

          // 2. Pre-cálculo Mapa Posición -> Empleado (Lógica clave de la jerarquía de personas)
          const positionToEmployeeMap = new Map();
          flatApiData
            .filter(
              (emp) =>
                emp &&
                emp.codigoPosicion != null &&
                emp.vacante !== "1" &&
                emp.codigoEmpleado,
            )
            .forEach((emp) => {
              const positionId = String(emp.codigoPosicion).trim();
              const employeeId = String(emp.codigoEmpleado).trim();
              if (!positionToEmployeeMap.has(positionId)) {
                positionToEmployeeMap.set(positionId, employeeId);
              } else {
                //console.warn(`Advertencia: Posición ${positionId} asignada a múltiples empleados. Usando ${positionToEmployeeMap.get(positionId)}.`);
              }
            });
          console.log(
            `Mapa Posición->Empleado creado con ${positionToEmployeeMap.size} entradas.`,
          );

          // 3. Transformación (Lógica Híbrida: IDs de Empleado + IDs de Posición para vacantes)
          const balkanNodes = flatApiData
            .filter(
              (emp) =>
                emp &&
                //emp.codigoPosicion != null &&
                emp.codigoPosicion != "00006" &&
                //emp.codigoPosicion != "00001" &&
                emp.puesto != null,
              //!(emp.codigoPosicionReporta === "00003" && emp.vacante === "1")
            )
            .map((emp) => {
              const isVacant = emp.vacante === "1";

              // ID HÍBRIDO: Usamos codigoEmpleado si existe, si no, codigoPosicion
              const id = isVacant
                ? String(emp.codigoPosicion).trim()
                : String(emp.codigoEmpleado).trim();

              const CodEmpleado = isVacant
                ? parseInt(emp.codigoPosicion)
                : parseInt(emp.codigoEmpleado);

              let pid = emp.codigoPosicionReporta
                ? String(emp.codigoPosicionReporta).trim()
                : null;

              if (pid && pid !== "0") {
                // El 'pid' SIEMPRE es una POSICIÓN.
                // Buscamos a qué 'id' (empleado o posición) corresponde.
                const managerEmployeeId = positionToEmployeeMap.get(pid);

                if (managerEmployeeId) {
                  // Encontrado: El jefe (empleado) es el pid.
                  pid = managerEmployeeId;
                } else {
                  // No encontrado: El jefe está vacante, el 'pid' es la POSICIÓN del jefe.
                  pid = pid; // Se mantiene como codigoPosicion

          // Dibuja líneas de reporte manual (alternativa a chart.config.slinks que crashea)

          chart.on("render", function (sender, args) {

            let svgLines = "";

            if (_slinksManuales && _slinksManuales.length > 0) {
              // Shared laneY for routeLeft slinks so all horizontal segments align
              let sharedLaneLeftY = null;
              // Helper: resolve effective toNode + laneOffset (fallback to GRP when collapsed)
              function resolveTarget(link) {
                let tn = sender.getNode(link.to);
                let offset = link.laneOffset || 30;
                if (link.fallbackTo) {
                  const grpN = sender.getNode(link.fallbackTo);
                  if (!tn || (grpN && grpN.min)) {
                    tn = grpN;
                    // HEAD is ~60px inside group top; collapsed GRP uses small offset to match
                    offset =
                      link.fallbackLaneOffset != null

                        : 12;
                  }
                }
                return { tn, offset };
              }

              _slinksManuales
                .filter((l) => l.routeLeft)
                .forEach(function (l) {
                  const fn = sender.getNode(l.from);
                  const { tn, offset } = resolveTarget(l);
                  if (!fn || !tn) return;
                  const candidate = tn.y - offset;
                  if (sharedLaneLeftY === null || candidate > sharedLaneLeftY)
                    sharedLaneLeftY = candidate;
                });

              _slinksManuales.forEach(function (link) {
                const fromNode = sender.getNode(link.from);
                const { tn: toNode, offset: effectiveLaneOffset } =
                  resolveTarget(link);
                if (!fromNode || !toNode) return;
                const fx = fromNode.x + fromNode.w / 2;
                const fy = fromNode.y + fromNode.h;
                const tx = toNode.x + toNode.w / 2;
                const ty = toNode.y;
                const laneY = ty - effectiveLaneOffset;
                const color = link.color || "#b0b0b0";
                let d;
                if (link.routeLeft) {
                  const grpCorp = sender.getNode("GRP_CORPORATIVO");
                  const leftX = grpCorp ? grpCorp.x - 30 : fx - 200;
                  const dropY = fy + 30;
                  const useLaneY =
                    sharedLaneLeftY !== null ? sharedLaneLeftY : laneY;
                  d = `M ${fx} ${fy} L ${fx} ${dropY} L ${leftX} ${dropY} L ${leftX} ${useLaneY} L ${tx} ${useLaneY} L ${tx} ${ty}`;
                } else if (link.routeRight) {
                  const grpCorp = sender.getNode("GRP_CORPORATIVO");
                  const rightX = grpCorp
                    ? grpCorp.x + grpCorp.w + 30
                    : fx + 200;
                  const dropY = fy + 55;
                  if (tx >= rightX) {
                    // RETAIL a la derecha del borde — L-shape: baja a dropY, va directo a tx, baja a RETAIL
                    d = `M ${fx} ${fy} L ${fx} ${dropY} L ${tx} ${dropY} L ${tx} ${ty}`;
                  } else {
                    // RETAIL debajo — C-shape: sale derecha a rightX, baja, regresa izquierda a RETAIL
                    d = `M ${fx} ${fy} L ${fx} ${dropY} L ${rightX} ${dropY} L ${rightX} ${laneY} L ${tx} ${laneY} L ${tx} ${ty}`;
                  }
                } else {
                  d = `M ${fx} ${fy} L ${fx} ${laneY} L ${tx} ${laneY} L ${tx} ${ty}`;
                }
                svgLines += `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-opacity="0.75" stroke-linecap="round" stroke-linejoin="round"/>`;
              });
