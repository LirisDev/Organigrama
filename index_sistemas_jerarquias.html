      // 1. Bloquea el zoom con la rueda del ratón (Ctrl + Rueda)
      window.addEventListener(
        "wheel",
        function (event) {
          // Comprueba si la tecla Ctrl está presionada
          if (event.ctrlKey) {
            event.preventDefault(); // Cancela el evento (el zoom)
          }
        },
        { passive: false },
      ); // 'passive: false' es necesario para permitir el preventDefault

      // 2. Bloquea el zoom con el teclado (Ctrl + '+' y Ctrl + '-')
      window.addEventListener("keydown", function (event) {
        // Comprueba si la tecla Ctrl (o Cmd en Mac) está presionada
        if (event.ctrlKey || event.metaKey) {
          // Comprueba si la tecla presionada es '+' o '-'
          if (
            event.key === "+" ||
            event.key === "-" ||
            event.key === "=" ||
            event.key === "_"
          ) {
            event.preventDefault(); // Cancela el evento (el zoom)
          }
        }
      });

      /**

        this.instance = balkanInstance; // Guardamos la instancia del gráfico
        this.currentPersonData = null;

        // --- 1. Encontrar los elementos del DOM ---
        this.overlay = document.getElementById("details-overlay");
        this.form = document.getElementById("custom-details-form");

        this.lineaEl = this.form.querySelector('[data-field="lineaNegocio"]');

        this.btnProcedimientos = this.form.querySelector(
          "#btn-manual-procedimientos",

        this.btnUsuario = this.form.querySelector("#btn-manual-usuario");
        this.btnCerrar = this.form.querySelector("#btn-cerrar-detalles");

        // --- 2. Asignar Event Listeners (¡Solo se hace una vez!) ---
        // Cerrar al hacer clic en el botón "Cerrar"
        this.btnCerrar.addEventListener("click", () => {
          this.hide();
        });

        // Cerrar al hacer clic FUERA del modal (en el overlay)
        this.overlay.addEventListener("click", (e) => {
          if (e.target === this.overlay) {
            this.hide();
          }
        });

        // Listener para la lista de empleados (usando delegación)
        const infoBlock = this.form.querySelector(".details-info-block");
        infoBlock.addEventListener("click", (event) => {
          // 1. Encontrar el '.employee-list-item' más cercano al que se hizo clic
          const item = event.target.closest(".employee-list-item");
          if (!item) return; // No se hizo clic en un item, no hacer nada

          // 2. Obtener el ID del empleado del data-attribute
          const empId = item.dataset.employeeId;
          if (!empId || !this.data || !this.data.listaEmpleados) return;

          // 3. Encontrar la data completa de ese empleado
          const empData = this.data.listaEmpleados.find(
            (e) => e.codigoEmpleado === empId,
          );
          if (!empData) return;

          // 4. ¡Llamar a nuestra función helper!
          // Esto re-poblará el modal con la información de la persona seleccionada
          const personDataForModal = {
            id: empData.codigoEmpleado,
            nombre: `${empData.nombre || ""} ${empData.apellido || ""}`.trim(),
            puesto: empData.puestoEmpleado || this.data.cargoPuesto,
            img: empData.foto || "Logo-Liris.png",
            email: empData.emailCorporativo,
            lineaNegocio: this.data.lineaNegocio,
            centroCosto: this.data.centroCosto,
            area: this.data.area,
            departamento: this.data.departamento,
            codDepAx: empData.codDepAx,
            codDepartamento: this.data.codDepartamento,
          };
          this.currentPersonData = personDataForModal; // ACTUALIZA LA VARIABLE
          this.fillPersonData(personDataForModal);
        });

        // --- Lógica de los botones de Manuales ---
        this.btnFunciones.addEventListener("click", () => {
          const url = getManualUrl(this.currentPersonData, "funciones");
          if (url) {
            window.open(url, "_blank");
          } else {
            alert(
              "No hay un Manual de Funciones configurado para este usuario.",
            );
          }
        });

        this.btnProcedimientos.addEventListener("click", () => {
          const url = getManualUrl(this.currentPersonData, "procedimientos");
          if (url) {
            window.open(url, "_blank");
          } else {
            alert(
              "No hay un Manual de Procedimientos configurado para este usuario.",
            );
          }
        });

        this.btnUsuario.addEventListener("click", () => {
          const url = getManualUrl(this.currentPersonData, "usuario");
          if (url) {
            window.open(url, "_blank");
          } else {
            alert("No hay un Manual de Usuario configurado para este usuario.");
          }
        });
      };

      /**
       * Método SHOW: Se llama CADA VEZ que se abre el modal.
       * ¡MANEJA 3 CASOS (Persona, Cargo-Lista, Cargo-Individual)!
       */
      CustomDetailsForm.prototype.show = function (nodeId) {
        // 1. Obtener la data más reciente del nodo
        this.data = this.instance.get(nodeId);
        if (!this.data) return;

        // Si el nodo tiene el tag "group" o "fantasma", NO mostramos el modal.
        // Solo retornamos y dejamos que el evento 'click' del chart maneje la expansión.
        if (
          this.data.tags &&
          (this.data.tags.includes("group") ||
            this.data.tags.includes("fantasma"))
        ) {
          return;
        }

        // Resetea la imagen ANTES de cualquier lógica.
        this.imgEl.style.display = "none";
        this.imgEl.src = "";

        const currentMode = document.getElementById("modo-select").value;
        const infoBlock = this.form.querySelector(".details-info-block");

        infoBlock.innerHTML = ""; // Limpiar el contenido anterior del bloque de info

        if (currentMode === "Persona") {
          // ==================================
          // --- VISTA MODO PERSONA ---
          // ==================================
          this.currentPersonData = this.data;
          this.fillPersonData(this.data);
        } else {
          // ==================================
          // --- VISTA MODO CARGO ---
          // ==================================
          const isVacant = this.data.tags.includes("vacante");
          const employeeList = this.data.listaEmpleados;

          if (employeeList && employeeList.length === 1) {
            // --- CASO 1: Cargo con 1 sola persona ---
            const singleEmp = employeeList[0];
            this.currentPersonData = {
              id: singleEmp.codigoEmpleado,
              nombre: `${singleEmp.nombre || ""} ${
                singleEmp.apellido || ""
              }`.trim(),
              puesto: singleEmp.puestoEmpleado || this.data.cargoPuesto,

      function iterate(c, n, collapseIds, excludeId) {
            const isFantasma = n.tags && n.tags.includes("fantasma");
    
    // El fantasma no se colapsa, pero SÍ se itera su descendencia
    if (excludeId != n.id && !isFantasma) {
        collapseIds.push(n.id);
    }

        // if (excludeId != n.id) {
        //   collapseIds.push(n.id);
        // }
        if (n.childrenIds && n.childrenIds.length > 0) {
          for (var i = 0; i < n.childrenIds.length; i++) {
            //iterate(c, c.getNode(n.childrenIds[i]), collapseIds, excludeId);
            const child = c.getNode(n.childrenIds[i]);
            
            // ← NUEVO: Si el hijo es fantasma, agregar SUS hijos explícitamente
            if (isFantasma && child) {
                iterate(c, child, collapseIds, excludeId);
            } else {
                iterate(c, child, collapseIds, excludeId);
            }

          }
        }
      }

      // 2. FUNCIÓN RECURSIVA (Para llenar los árboles dentro de los grupos)
      // =========================================================
      function addDescendantsToView(rootNode, allNodesMap, renderMap) {
        const children = [];
        // Buscar hijos en el mapa global
        allNodesMap.forEach((node) => {
          if (node.pid === rootNode.id) {
            children.push(node);
          }
        });

        children.forEach((child) => {
          if (!renderMap.has(child.id)) {
            // El hijo NO lleva stpid, se dibuja normal colgando del padre
            const childClone = Object.assign({}, child);
            childClone.stpid = null;
            renderMap.set(childClone.id, childClone);

            // Recursividad: buscar los hijos de este hijo (nietos, bisnietos...)
            addDescendantsToView(childClone, allNodesMap, renderMap);
          }
        });
      }

      // --- Función Sanitize (para evitar bucles infinitos) ---
      function sanitizeCircularReferences(nodes) {
        const nodeMap = new Map();
        nodes.forEach((node) => {
          if (node && node.id != null) nodeMap.set(node.id, node);
          else {
            console.warn(
              "Sanitizing: Omitiendo nodo inválido durante creación de mapa:",
              node,
            );
          }
        });

        let loopsBroken = 0;
        console.log("Sanitizing: Iniciando sanitización de bucles...");
        const nodeIds = Array.from(nodeMap.keys());
        for (const nodeId of nodeIds) {
          const startNode = nodeMap.get(nodeId);
          if (!startNode || startNode.pid == null) continue;
          const pathVisited = new Set();
          let currentNode = startNode;
          while (currentNode && currentNode.pid != null) {
            const currentId = currentNode.id;
            const parentId = currentNode.pid;

            // 1. Detectar bucle en esta traza
            if (pathVisited.has(currentId)) {
              console.warn(
                `¡Bucle detectado! Traza desde ${startNode.id} encontró un ciclo al volver a ${currentId}. Rompiendo enlace ${currentId} -> ${parentId}`,
              );
              currentNode.pid = undefined; // Romper
              loopsBroken++;
              break;
            }
            pathVisited.add(currentId);

            // 2. Verificar si el padre existe en el mapa
            if (!nodeMap.has(parentId)) {
              // console.warn(`Sanitizing: Nodo ${currentId} tiene un pid inválido o faltante: ${parentId}. Tratando nodo como raíz.`);
              currentNode.pid = undefined; // Convertir en raíz
              break;
            }

            currentNode = nodeMap.get(parentId);
            if (!currentNode) {
              console.error(
                "Sanitizing: Error inesperado al obtener el padre",
                parentId,
              );
              break;
            }
          }
        }
        console.log(`Sanitizing: Sanitización completa...`);
        return Array.from(nodeMap.values());
      }

      // --- Mapeo de nivelJerarquico a Tag de Subnivel ---
      /* Aplica tags de subnivel (sub-level-X) usando la lógica: (order - orderPadre - 1) */
      function aplicarSubnivelesRelativos(nodos) {
        console.log(
          "Iniciando post-procesamiento de subniveles RELATIVOS AL PADRE...",
        );

        // 1. Crear un mapa para buscar el 'order' de cualquier nodo por su ID
        // Esto es necesario para encontrar el 'order' del padre
        const orderMap = new Map();
        for (const node of nodos) {
          if (node && node.id != null) {
            orderMap.set(node.id, node.order || 99);
          }
        }

        // 2. Iterar todos los nodos para asignar el tag de subnivel
        for (const node of nodos) {
          if (!node.tags) node.tags = []; // Asegurar que 'tags' exista

          let subLevelIndex = 0; // Default para nodos huérfanos
          const pid = node.pid;
          const miOrder = node.order || 99;

          if (pid && orderMap.has(pid)) {
            // Si el nodo tiene un padre que encontramos en el mapa
            const padreOrder = orderMap.get(pid);
            subLevelIndex = miOrder - padreOrder - 1;
          } else if (!pid) {
            // No tiene pid, es un nodo raíz.
            // Asumimos que el "padre" es 0.
            subLevelIndex = miOrder - 0 - 1;
          }

          // Nos aseguramos de que el subnivel no sea negativo
          if (subLevelIndex < 0) {
            subLevelIndex = 0;
          }

          const subLevelTag = `sub-level-${subLevelIndex}`;

          if (!node.tags.includes(subLevelTag)) {
            node.tags.push(subLevelTag);
          }

          // Añadir el tag para la línea punteada
          if (subLevelIndex > 0 && !node.tags.includes("sublevel-node")) {
            node.tags.push("sublevel-node");
          }
        }
        console.log("Post-procesamiento de subniveles relativos completado.");
      }

      /**
       * Construye un árbol filtrado mostrando solo:
       * - El nodo objetivo
       * - Su ascendencia (padres hasta la raíz)
       * - Su descendencia (todos los hijos)
       * - Los grupos necesarios para mantener la estructura
       */
      function construirArbolFoco(targetNodeId) {
          console.log("🎯 Construyendo árbol de foco para:", targetNodeId);
          const sourceNodes = focusState.active ? Array.from(focusState.savedNodes.values()) : chart.config.nodes;
          const currentMode = document.getElementById("modo-select").value;
          // const sourceNodes = currentMode === "Cargo" ? allCargoNodes : allNodes;
          const sourceMap = new Map(sourceNodes.map(n => [n.id, Object.assign({}, n)]));
          
          const nodosDelFoco = new Map();
          const targetNode = sourceMap.get(targetNodeId);
          console.log(targetNodeId)
          console.log(targetNode)
          if (!targetNode) {
              console.error("❌ Nodo objetivo no encontrado");
              return null;
          }

          // =========================================================
          // 1. AGREGAR EL NODO OBJETIVO
          // =========================================================
          nodosDelFoco.set(targetNodeId, Object.assign({}, targetNode));

          // =========================================================
          // 2. AGREGAR ASCENDENCIA (Subir hasta la raíz)
          // =========================================================
          function agregarAscendencia(nodeId) {
              const node = sourceMap.get(nodeId);
              if (!node) return;
              
              // Agregar el nodo actual
              if (!nodosDelFoco.has(node.id)) {
                  nodosDelFoco.set(node.id, Object.assign({}, node));
              }
              
              // Si tiene padre, seguir subiendo
              if (node.pid) {
                  agregarAscendencia(node.pid);
              }
              
              // // Si tiene stpid (está dentro de un grupo), agregar el grupo
              // if (node.stpid) {
              //     const grupoNode = sourceMap.get(node.stpid);
              //     if (grupoNode && !nodosDelFoco.has(grupoNode.id)) {
              //         nodosDelFoco.set(grupoNode.id, Object.assign({}, grupoNode));
              //         // El grupo también puede tener padre
              //         if (grupoNode.pid) {
              //             agregarAscendencia(grupoNode.pid);
              //         }
              //     }
              // }
          }
          const Presidente = sourceNodes.find((n) => n.codPosicion === "00001" || n.id === "00001"  ); // Busca el ID en tu config maestra
          if (Presidente) {
              if (Presidente && !nodosDelFoco.has(Presidente.id)) {
                  // Le forzamos el pid null y lo metemos al Corporativo para que salga perfecto arriba
                  const presiClon = Object.assign({}, Presidente);
                  presiClon.pid = null; 
                  presiClon.stpid = "GRP_CORPORATIVO";
                  nodosDelFoco.set(presiClon.id, presiClon);
              }
          }
          
          agregarAscendencia(targetNodeId);

          // =========================================================
          // 3. AGREGAR DESCENDENCIA (Todos los hijos recursivamente)
          // =========================================================
          function agregarDescendenciaFoco(nodeId) {
              sourceMap.forEach((node) => {
                  if (node.pid === nodeId && !nodosDelFoco.has(node.id)) {
                      nodosDelFoco.set(node.id, Object.assign({}, node));
                      // Recursión para nietos, bisnietos...
                      agregarDescendenciaFoco(node.id);
                  }
              });

              // 👻 PUENTE HACIA ABAJO: Si el nodo que estamos revisando tiene un clon Fantasma, traemos a sus hijos
              const posibleFantasmaId = `HEAD_LINEA_GRP_CARNICERIA_${nodeId}`;
              if (sourceMap.has(posibleFantasmaId) && !nodosDelFoco.has(posibleFantasmaId)) {
                  const fantasma = sourceMap.get(posibleFantasmaId);
                  nodosDelFoco.set(fantasma.id, Object.assign({}, fantasma));
                  agregarDescendenciaFoco(fantasma.id);
              }
          }
          
          agregarDescendenciaFoco(targetNodeId);

          /// 4. ASEGURAR CAJAS Y GRUPOS (stpid y pid dinámicos)
          // Un bucle que atrapa automáticamente a qué división o macrogrupo pertenece la persona
          let agregados;
          do {
              agregados = false;
              const actuales = Array.from(nodosDelFoco.values());
              actuales.forEach(node => {
                  // Si el nodo vive dentro de una caja (stpid) y la caja no está, la traemos
                  if (node.stpid && !nodosDelFoco.has(node.stpid)) {
                      const grupo = sourceMap.get(node.stpid);
                      if (grupo) {
                          nodosDelFoco.set(grupo.id, Object.assign({}, grupo));
                          agregados = true;
                      }
                  }
                  // Si la caja (o el nodo) reporta a un jefe (pid) y no está, lo traemos
                  if (node.pid && !nodosDelFoco.has(node.pid)) {
                      const padre = sourceMap.get(node.pid);
                      if (padre) {
                          nodosDelFoco.set(padre.id, Object.assign({}, padre));
                          agregados = true;
                      }
                  }
              });
          } while (agregados); // Repetir hasta que todas las paredes estructurales estén firmes

          console.log(`✅ Árbol de foco construido: ${nodosDelFoco.size} nodos`);
          return nodosDelFoco;
      }

      /**
       * Activa el modo foco para un nodo específico
       */
      function activarModoFoco(nodeId) {
          console.log("🔍 Activando modo foco para:", nodeId);
          // 1. Guardar la foto exacta del organigrama (solo si no estamos ya en foco)
          if (!focusState.active) {
              focusState.savedNodes = new Map(chart.config.nodes.map(n => [n.id, Object.assign({}, n)]));
              focusState.savedExpand = Object.assign({}, chart.config.expand);
              focusState.savedCollapse = Object.assign({}, chart.config.collapse);
          }
          
          focusState.targetNodeId = nodeId;
          focusState.active = true;

          // NUEVO: Deshabilitar filtros
          deshabilitarFiltros();

          const arbolFoco = construirArbolFoco(nodeId);
          if (!arbolFoco) {
              console.error("❌ No se pudo construir el árbol de foco");
              return;
          }
          
          // 2. Inyectar el tag "focused-node" al seleccionado (para que el CSS cambie el botón a Rojo/X)
          const finalArray = Array.from(arbolFoco.values());
          finalArray.forEach(n => {
              if (!n.tags) n.tags = [];
              if (n.id === nodeId) {
                  n.tags.push("focused-node");
              }
          });

          // Agregar clase visual al contenedor
          document.getElementById("tree-container").classList.add("focus-mode-active");
          
          // Marcar el botón específico como activo
          setTimeout(() => {
              const activeBtn = document.querySelector(`[data-focus-btn="${nodeId}"]`);
              if (activeBtn) {
                  activeBtn.classList.add("active");
              }
            },300 );

          // 3. Configurar expansión total (queremos ver todo el árbol del nodo)
          chart.config.expand = {
              nodes: Array.from(arbolFoco.keys()),
              allChildren: true
          };
          chart.config.collapse = {
              level: 99, // No colapsar nada
              allChildren: false
          };
          
          // 4. Activar bandera CSS en el contenedor principal para ocultar los botones de los demás
          document.getElementById("tree").classList.add("foco-activo");
          
          // 5. Cargar el nuevo árbol
          chart.load(finalArray);
          setTimeout(() => expandirFantasmas(), 10);
          setTimeout(() => chart.fit(), 50);

          
          // 5. Centrar en el nodo objetivo después de un momento
          setTimeout(() => {
              chart.center(nodeId, { anim: true, duration: 400 }, () => {
                  console.log("✅ Modo foco activado");
              });
          }, 200);
      }
      
      /**
       * Desactiva el modo foco y restaura la vista anterior
       */
      function desactivarModoFoco() {
          console.log("🔙 Desactivando modo foco");
          if (!focusState.active) return;
          
          // 1. Restaurar configuración
          chart.config.expand = focusState.savedExpand;
          chart.config.collapse = focusState.savedCollapse;
          
          // Deshabilitar filtros
          habilitarFiltros();
          
          // 2. Quitar el tag "focused-node" de nuestro backup para que el botón rojo vuelva a ser naranja
          const nodosRestaurados = Array.from(focusState.savedNodes.values());
          nodosRestaurados.forEach(n => {
              if (n.tags) {
                  n.tags = n.tags.filter(t => t !== "focused-node");
              }
          });

          // Remover clase visual
          document.getElementById("tree-container").classList.remove("focus-mode-active");
          
          // Remover marca del botón
          const activeBtn = document.querySelector(".focus-btn.active");
          if (activeBtn) {
              activeBtn.classList.remove("active");
          }


          // 3. Quitar bandera CSS general
          document.getElementById("tree").classList.remove("foco-activo");   
          
          // 4. Restaurar el mapa a como estaba
          chart.load(nodosRestaurados);
          setTimeout(() => expandirFantasmas(), 10);
          setTimeout(() => chart.fit(), 50);

          const lastFocusId = focusState.targetNodeId;

          // 5. Limpiar variables de estado
          focusState.active = false;
          focusState.targetNodeId = null;
          focusState.savedNodes = null;
          focusState.savedExpand = null;
          focusState.savedCollapse = null;
          
          setTimeout(() => {
              chart.center(lastFocusId, { anim: true, duration: 400 });
          }, 150);
      }

      function renderOrganigramaGrupos() {
        if (!chart) return;

        console.log("🚀 renderOrganigramaGrupos INICIO");
        
        const selectedAreaRaw = $("#area-select").val();

        const sourceNodes = currentMode === "Cargo" ? allCargoNodes : allNodes;

            ? ESTRUCTURA_MACRO_CARGO

        if (!sourceNodes || sourceNodes.length === 0) {

          return;
        }

        // const nodesToRender = new Map();
        // const sourceMap = new Map(sourceNodes.map((n) => [n.id, n]));

        const nodesToRender = new Map();
        
        // 1. CLONAMOS EL MAPA (Shallow Copy) PARA PODER MANIPULARLO SIN DAÑAR LA DATA GLOBAL
        const sourceMap = new Map();
        sourceNodes.forEach((n) => sourceMap.set(n.id, Object.assign({}, n)));

        // =========================================================
        // EXCEPCIÓN HARDCODEADA: EL CLON DE ANDRES HERRERA (9987)
        // =========================================================
        const idAndres = "9987";
        const andresOriginal = sourceMap.get(idAndres);

        if (andresOriginal) {

            const andresClon = Object.assign({}, andresOriginal);
            andresClon.id = idAndresClon;
            
            // Le asignamos como jefe a Santiago (ID Original: HEAD_LINEA_GRP_CARNICOS_12), para que la recursividad de Cárnicos lo atrape.
            // OJO: Dejamos su lineaNegocio intacta ("RETAIL") para que el contador NO lo sume en Cárnicos.
            andresClon.pid = "1841";  // TODO: que le agarre al cargo y no a la persona
            
            // En renderOrganigramaGrupos, donde creas el clon de Andrés:
            andresClon.displayNombre = `${andresOriginal.nombre} (CÁRNICOS)`;
            
            // Lo guardamos en el mapa temporal para que el motor lo encuentre al dibujar
            sourceMap.set(idAndresClon, andresClon);

            // B. El Agente de Tránsito: Revisamos a los hijos de Andrés
            sourceMap.forEach((node) => {
                if (node.pid === idAndres) { // Si reporta al Andrés original
                    const lineaHijo = (node.lineaNegocio || "").toUpperCase().trim();

                    //if (node.id === "2819") {
                      
                        // Si el hijo es de Cárnicos, lo divorciamos del original y lo enrutamos al clon
                        node.pid = idAndresClon; 
                    }
                }
            });
        }
        // =========================================================

        // =========================================================
        // EXCEPCIÓN CARGOS: CLON DE LA POSICIÓN 01098 (Andrés/Hugo)
        // =========================================================
        if (currentMode === "Cargo") {
            const idPosClon = "00943";
            const posOriginal = sourceMap.get(idPosClon);

            if (posOriginal) {
                const idClon = `CLON_CARNICOS_${idPosClon}`;
                const posClon = Object.assign({}, posOriginal);

                posClon.pid = idPosClon; // Se conecta a sí mismo...

                posClon.displayNombre = `${posOriginal.cargoPuesto} (CÁRNICOS)`;
                sourceMap.set(idClon, posClon);

                // Redirigir hijos CARNICOS al clon
                sourceMap.forEach((node) => {
                    if (node.pid === idPosClon) {
                        const lineaHijo = (node.lineaNegocio || "").toUpperCase().trim();
                        if (lineaHijo === "CARNICOS") {
                            node.pid = idClon;
                        }
                    }
                });
            }
        }
        // Helper para buscar nodos
        const encontrarNodoPorConfig = (configId) => {
          if (!configId) return null;
          let nodo = sourceMap.get(configId);
          if (!nodo) nodo = sourceNodes.find((n) => n.codPosicion === configId);
          return nodo;
        };

        const antonioNode = encontrarNodoPorConfig(
          CABEZAS_ACTIVAS.CORPORATIVO.id,
        );
        const idAntonio = antonioNode ? antonioNode.id : null;

        // =========================================================
        // 1. CORPORATIVO (GRUPO GRIS)
        // =========================================================
        const groupCorpId = "GRP_CORPORATIVO";
        nodesToRender.set(groupCorpId, {
          id: groupCorpId,
          pid: null,
          nombre: "CORPORATIVO",
          cargoPuesto: "CORPORATIVO", // ✅ AGREGAR
          title: "Holding",
          tags: ["group"],
          templateName: "group",
          order: 1,
        });

        if (idAntonio) {
          // A. Antonio (Raíz)
          const nodoAntonio = Object.assign({}, sourceMap.get(idAntonio));
          nodoAntonio.stpid = groupCorpId;
          nodoAntonio.pid = null;
          nodesToRender.set(idAntonio, nodoAntonio);

          // B. Staff de Antonio (Gerentes + SANTIAGO)
          // Buscamos manualmente a los hijos de Antonio para aplicar lógica especial a Santiago
          sourceMap.forEach((node) => {
            if (node.pid === idAntonio) {
              const lineaNode = (node.lineaNegocio || "").toUpperCase().trim();

              // Santiago (ID 12) tiene linea "CORPORATIVO", así que él SÍ pasa.
              // Juan José tiene linea "NEGOCIO RETAIL" (o similar), así que él NO pasa.
              if (lineaNode !== "CORPORATIVO" || node.puesto === "COMITE" || node.puesto === "COMITE COMITE")
                return;

              // ¿Es este nodo una Cabeza de División (Santiago o Juan Jose)?
              const esCabezaDivision = Object.values(ESTRUCTURA_ACTIVA).some(
                (m) => {
                  const head = encontrarNodoPorConfig(m.headId);
                  return head && head.id === node.id;
                },
              );

              // Agregamos al nodo (Santiago ID 12 entra aquí como hijo normal de Antonio)
              const nodoHijo = Object.assign({}, node);
              //nodoHijo.stpid = groupCorpId; // Va dentro del grupo gris

              // IMPORTANTE: Si es Santiago, usamos su ID ORIGINAL ("12") aquí arriba.
              // Esto hará que Angie ("pid": "12") se conecte a él automáticamente.
              nodesToRender.set(nodoHijo.id, nodoHijo);

              // --- C. FILTRO DE HIJOS (La clave de Angie) ---
              let filtroHijosCorp = null;

              if (esCabezaDivision) {
                // Si es Santiago, le decimos: "Solo carga a tus hijos que sean de CORPORATIVO"
                filtroHijosCorp = (n) => {
                  const linea = (n.lineaNegocio || "").toUpperCase().trim();
                  return linea === "CORPORATIVO";
                };
              }

              // Traemos la descendencia.
              // Para Santiago, esto traerá a Angie. Ignorará a Pecuario.
              // Para el resto (Gerente Financiero), trae todo normal.
              agregarDescendencia(
                nodoHijo.id,
                nodoHijo.id,
                nodesToRender,
                sourceMap,
                [],
                filtroHijosCorp,
              );
            }
          });
        }

        // --- Si es solo CORPORATIVO, salimos aquí ---
        if (esSoloCorp) {
          cargarYFinalizar(nodesToRender);
          return;
        }

        // =========================================================
        // 2. MACRO GRUPOS (PECUARIO / RETAIL)
        // =========================================================
        Object.values(ESTRUCTURA_ACTIVA).forEach((macro) => {
          // --- CAMBIO 3: Filtro de División ---
          // Solo mostramos esta división si es "TODOS" o si la línea seleccionada está dentro de sus subgrupos.

          // if (!esTodasAreas && areaFiltro !== areaDeEsteMacro) return;

          // if (!esTodasLineas && !contieneLaLinea) return; // Ignoramos la caja entera

              // Gerente de Línea

                      nodoGerente.puesto = "";

                      nodoGerente.collapsed = false; // Forzar expandido

                      agregarDescendencia(idGerenteLineaVisual, gerenteOriginal.id, nodesToRender, sourceMap, [], filtroLinea);
                      // console.log("🔓 Creando nodo fantasma Carnicería EXPANDIDO:", idGerenteLineaVisual);

                  } else {
                      // nodoGerente.displayNombre = `${gerenteOriginal.nombre} (${obtenerAliasLinea(nombreLinea)})`;
                      nodoGerente.displayNombre = `${gerenteOriginal.nombre} (${obtenerAliasLinea(nombreLinea)})`;
                      nodesToRender.set(idGerenteLineaVisual, nodoGerente);

                      // 🛡️ CERCA ELÉCTRICA: Lista de exclusión
                      let idsExcluir = [];
                      
                      // Si es Cárnicos, metemos en la lista negra a todos los de Carnicería
                      if (nombreLinea === "CARNICOS") {
                          sourceMap.forEach(n => {
                              const ln = (n.lineaNegocio || "").toUpperCase().trim();
                              if (ln === "CARNICERIA") {
                                  idsExcluir.push(n.id);
                              }
                          });
                      }

                      const filtroLinea = (nodo) => {
                        const lineaHijo = (nodo.lineaNegocio || "").toUpperCase().trim();
                        
                        // Si Cárnicos solo se está dibujando como SOPORTE para Carnicería...
                        if (esSoporteParaOtraLinea && lineaFiltro === "CARNICERIA") {
                            const idOmar = CABEZAS_ACTIVAS["CARNICERIA"]?.id;
                            // SOLO dejamos pasar a Omar. Bloqueamos al resto (incluso clones)
                            return nodo.codPosicion === idOmar || String(nodo.id).includes(idOmar);
                        }

                        return lineaHijo === nombreLinea || String(nodo.id).includes("CLON_");
                      };

                      const aplicarProfundo = esSoporteParaOtraLinea && lineaFiltro === "CARNICERIA";
                      agregarDescendencia(idGerenteLineaVisual, gerenteOriginal.id, nodesToRender, sourceMap, idsExcluir, filtroLinea, aplicarProfundo);
                  
                  }
                }
              }
            });
          }
        });
        // =========================================================
        // 6. CONTEO VISUAL FINAL (Para los globos naranjas)
        // =========================================================
        const visualCounts = {};

        // A. Inicializar conteos para todas las líneas y corporativo
        Object.keys(CABEZAS_ACTIVAS).forEach((k) => {
          visualCounts[k.toUpperCase().replace(/\s/g, "")] = 0;
        });
        visualCounts["CORPORATIVO"] = 0;

        // B. Inicializar conteos para las Divisiones Macro (Pecuario/Retail)
        Object.values(ESTRUCTURA_ACTIVA).forEach((macro) => {
          visualCounts[macro.id] = 0;
        });

        // C. Primera pasada: Contar personas en su grupo directo (stpid)
        nodesToRender.forEach((node) => {
          // --- EXCEPCIÓN DE RRHH: IGNORAR EL "COMITÉ" ---
          // Si el puesto contiene la palabra COMITE, lo ignoramos para que no sume jamás.
          const nombrePuesto = node.puesto ? node.puesto.toUpperCase().trim() : "";
          if (nombrePuesto === "COMITE" || nombrePuesto === "COMITÉ") {
              return; // Lo saltamos como si no existiera matemáticamente
          }

          // C.1 Ignoramos nodos que sean grupos o auxiliares (fantasmas)
          if (
            node.tags &&
            (node.tags.includes("group") || node.tags.includes("fantasma") || node.tags.includes("head-of-group")) // || node.tags.includes("vacante")) // TODO: Descomentar si piden que solo se cuenten las personas activas y no las vacantes disponibles
          )
            return;

          // C.2 Extraemos la línea de negocio real del contrato del empleado (normalizada)
          const lineaRealEmpleado = node.lineaNegocio ? node.lineaNegocio.trim().toUpperCase().replace(/\s/g, "") : "N/A";

          if (node.tags && node.tags.includes("head-of-group")) {
              // ✅ EXCEPCIÓN: A Priscilla (Cabeza de Derivados) SÍ la contamos.
              if (node.stpid !== "GRP_MACRO_DERIVADOS") return;
          }
          // ✅ NUEVO: Todo el personal de Derivados se suma directo a la caja del Comité
          if (lineaRealEmpleado === "DERIVADOS" || node.stpid === "GRP_MACRO_DERIVADOS") {
              visualCounts["GRP_MACRO_DERIVADOS"]++;
              return; // Ya lo sumamos, pasamos al siguiente
          }
          // C.3 ¿Dónde está sentado visualmente este nodo ahora mismo?
          if (node.stpid) {
            // Está dentro de una caja (ej: GRP_CARNICERIA)
            const nombreCaja = node.stpid.replace("GRP_", "");
            if (nombreCaja === lineaRealEmpleado) {
                if (visualCounts[nombreCaja] !== undefined) {
                  visualCounts[nombreCaja]++;
                }
            } else {
                // El empleado está de invitado en otra caja (ej. Omar Buritica en Carnicería).
                // ¡No sumamos nada! Fantasma numérico.
                // console.log(`Empleado ${node.nombre} ignorado en ${nombreCaja} porque pertenece a ${lineaRealEmpleado}`);
            }
          } else {
            // Fallback: usar su línea de negocio original si no tiene stpid (ej: staff directo raíz)
            // Está suelto (ej. Corporativo directo). Lo sumamos a su línea real.
            if (visualCounts[lineaRealEmpleado] !== undefined) {
              visualCounts[lineaRealEmpleado]++;
            } 
          }
        });

        // D. AGREGACIÓN: Sumar los totales de las líneas a sus Divisiones Macro
        // Ejemplo: División Pecuaria = Santiago + Carnicería + Cárnicos + Balanceado...
        Object.values(ESTRUCTURA_ACTIVA).forEach((macro) => {
          macro.subgrupos.forEach((sub) => {
            const subKey = sub.toUpperCase().replace(/\s/g, "");
            if (visualCounts[subKey]) {
              visualCounts[macro.id] += visualCounts[subKey];
            }
          });
        });

        // E. ASIGNAR LOS CONTEOS A LOS NODOS DE GRUPO
        nodesToRender.forEach((node) => {
          if (node.tags && node.tags.includes("group")) {
            // Caso 1: Es una División Macro (Pecuario/Retail)
            if (visualCounts[node.id] !== undefined) {
              node.conteo = String(visualCounts[node.id]);
            }
            // Caso 2: Es una Línea de Negocio Individual o Corporativo
            else {
              const lineaKey = node.id.replace("GRP_", "");
              if (visualCounts[lineaKey] !== undefined) {
                node.conteo = String(visualCounts[lineaKey]);
              }
            }
          }
        });

        console.log("📊 Conteos Visuales Finales (Personas Únicas):", visualCounts);

        // console.log("📊 nodesToRender.size:", nodesToRender.size);

        // sourceMap.forEach((node) => {
        //     if (node.pid === "12") {
        //         console.log(`Hijo de Santiago: ${node.id} - ${node.nombre} - linea: ${node.lineaNegocio} - pasaFiltro: ${(node.lineaNegocio || "").toUpperCase().trim() === "CARNICOS"}`);
        //     }
        // });
        // Disparar renderizado final
        cargarYFinalizar(nodesToRender);
      }

      function cargarYFinalizar(nodesToRender) {

          calcularDescendenciaManual(finalArray);

        // AGREGAR ESTO: Asegurar displayNombre en todos los nodos
        finalArray.forEach((node) => {

        // if (currentMode === "Cargo") {
        //     const virtuales = allCargoNodes;
        //     finalArray = [...finalArray, ...virtuales];
        // }

                    else

                } else {
                    node.tags.push(esVacante ? "vacanteComplex" : (esCargo ? "cargoComplex" : "fichaComplex"));
                }
            } else {
                if (esVacante) node.tags.push("vacanteSimple");
            }
        });

        console.log(`✅ Renderizando Filtrado: ${finalArray.length} nodos.`);

            // ✅ LIMPIAR estado interno de Balkan nodo por nodo
        // (esto evita que recuerde expansiones manuales previas)
        // ✅ Siempre limpiar estado interno de Balkan
        finalArray.forEach((node) => {
            delete node.state;
            node.expanded = false; // ← Explícito, no solo delete
        });

        // ✅ SIEMPRE setear expand/collapse antes de cargar
        const lineaFiltro = ($("#linea-negocio-select").val() || "").toUpperCase().trim();
        const hayFiltroEspecifico = lineaFiltro !== "TODOS";

        // LISTA DE NODOS A EXPANDIR (incluye fantasmas)
        const nodosAExpandir = [
            "GRP_CORPORATIVO",

            "GRP_MACRO_INDUSTRIAL",
            "GRP_MACRO_DERIVADOS",
            "GRP_MACRO_INMOBILIARIA",
            "GRP_MACRO_RETAIL",
            "GRP_CARNICERIA",
            "GRP_PECUARIOS",
            "GRP_CARNICOS",
            "GRP_DERIVADOS",
            "GRP_BALANCEADO",
            "GRP_RETAIL",
            "GRP_MARKETING"
        ];

        // AGREGAR TODOS LOS FANTASMAS DINÁMICAMENTE
        finalArray.forEach(node => {
            if (node.tags && node.tags.includes("fantasma")) {
                nodosAExpandir.push(node.id);
                // console.log("🔓 Agregando fantasma a expansión:", node.id);
            }
        });

        // 🧠 EXCEPCIÓN VIP EXCLUSIVA PARA CARNICERÍA
        if (lineaFiltro === "CARNICERIA") {
            const configActiva = esCargo ? CABEZAS_NEGOCIO_CARGO : CABEZAS_NEGOCIO_TEMP;
            const idOmar = configActiva["CARNICERIA"]?.id;
            const idSantiago = configActiva["CARNICOS"]?.id;
            
            finalArray.forEach(n => {
                if (n.codPosicion === idOmar || String(n.id).includes(idOmar) || String(n.id).includes(`HEAD_LINEA_GRP_CARNICOS_${idSantiago}`)) {
                    nodosAExpandir.push(n.id);
                }
            });
        }
        
        // EXCEPCIÓN VIP DINÁMICA PARA EL FILTRO ACTIVO (¡EL CAMBIO CLAVE!)
        // Si hay un filtro específico (como 'PECUARIOS' o 'GRANJAS AVÍCOLAS'), forzamos su nodo de grupo a expandirse.
        if (hayFiltroEspecifico) {
            // El ID del nodo de grupo es GRP_ + el valor del filtro (reemplazando espacios por guiones bajos)
            // Ej: "PECUARIOS" -> "GRP_PECUARIOS", "GRANJAS AVÍCOLAS" -> "GRP_GRANJAS_AVÍCOLAS"
            const grpId = `GRP_${lineaFiltro.replace(/\s+/g, '_')}`;
            const macroGrpId = `GRP_MACRO_${lineaFiltro.replace(/\s+/g, '_')}`;

            console.log(grpId)
            console.log(macroGrpId)
            // 1. Si es una Línea normal (Ej. PECUARIOS)
            if(finalArray.some(n => n.id === grpId)){
                nodosAExpandir.push(grpId);
            } 
            // 2. Si es una División Macro sin sub-líneas (Ej. DERIVADOS)
            else if (finalArray.some(n => n.id === macroGrpId)) {
                nodosAExpandir.push(macroGrpId);
                
                // Buscamos a la cabeza del comité utilizando el prefijo que nosotros mismos le pusimos al clon.
                // ¡Esto no fallará nunca por culpa de los ceros a la izquierda!
                const prefijoCabeza = `HEAD_MACRO_${macroGrpId}_`;
                const nodoCabeza = finalArray.find(n => String(n.id).startsWith(prefijoCabeza));
                console.log(nodoCabeza)
                if (nodoCabeza) {

        // ❌ ELIMINAMOS EL allChildren: true.

      function expandirFantasmas() {
          const fantasmas = chart.config.nodes
              .filter(n => n.tags && n.tags.includes("fantasma"))
              .map(n => n.id);
          
          if (fantasmas.length === 0) return;

          chart.expand(null, fantasmas, () => {
              fantasmas.forEach(ghostId => {
                  const ghostNode = chart.getNode(ghostId);
                  if (ghostNode?.childrenIds?.length > 0) {
                      chart.expand(ghostId, ghostNode.childrenIds);
                  }
              });
          });
      }
      // Función recursiva para agregar hijos con filtros
      // idVisualPadre: El ID del nodo padre en el gráfico (puede ser clon o real)
      // idOriginalPadre: El ID real en la data (para buscar quién le reporta de verdad)
      // nodesToRender: El mapa donde guardamos los nodos a dibujar
      // sourceMap: La data original
      // idsAExcluir: Lista negra de IDs que no queremos dibujar en esta rama
      // filtroEstricto: Función opcional. Si devuelve FALSE, el hijo se ignora.
      function agregarDescendencia(
        idVisualPadre,
        idOriginalPadre,
        nodesToRender,
        sourceMap,
        idsAExcluir = [],
        filtroEstricto = null,
        filtroProfundo = false // NUEVO: Bandera para heredar el filtro
      ) {
        // Si no especificamos original, es el mismo que el visual
        const idBusqueda = idOriginalPadre || idVisualPadre;

        sourceMap.forEach((node) => {
          // ¿El nodo le reporta a este jefe?
          if (node.pid === idBusqueda) {
            // 1. Chequeo de lista negra
            if (idsAExcluir.includes(node.id)) return;

            // 2. Filtro Lógico (Aquí es donde separamos a Angie del resto)
            if (filtroEstricto && !filtroEstricto(node)) return;

            // Si pasa las pruebas, lo agregamos
            if (!nodesToRender.has(node.id)) {
              const nodoHijo = Object.assign({}, node);

              // Si el padre visual es un clon, actualizamos el pid del hijo
              if (idVisualPadre !== idOriginalPadre) {
                nodoHijo.pid = idVisualPadre;
              }

              nodesToRender.set(nodoHijo.id, nodoHijo);

              // Recursividad: Buscamos a los hijos de este hijo (nietos)
              // Nota: A los nietos ya NO les aplicamos el filtro estricto del abuelo.
              // Ejemplo: Los asistentes de Angie deben salir con Angie, sin importar si son "Corp" o no.
              agregarDescendencia(
                nodoHijo.id,
                nodoHijo.id,
                nodesToRender,
                sourceMap,
                idsAExcluir,
                filtroProfundo ? filtroEstricto : null, // Se hereda si es profundo
                filtroProfundo
              );
            }
          }
        });
      }

      ///////// * Reconstruye el árbol manteniendo la jerarquía de los padres.
      function aplicarFiltrosJerarquicos() {
        if (!chart) return;

        const currentMode = document.getElementById("modo-select").value;
        const sourceNodes = currentMode === "Cargo" ? allCargoNodes : allNodes;

        if (!sourceNodes.length) {
          chart.load([]);
          return;
        }

        // 1. Obtener filtros
        const selectedLinea = $("#linea-negocio-select").val();
        const selectedCosto = $("#centro-costos-select").val();
        const selectedProposito = $("#proposito-select").val();

        if (!selectedLinea || !selectedCosto || !selectedProposito) {
          chart.load([]);
          return;
        }

        console.log(
          `Filtrando: L:${selectedLinea} | C:${selectedCosto} | P:${selectedProposito}`,
        );

        // 2. Mapa Global
        const fullNodeMap = new Map(sourceNodes.map((n) => [n.id, n]));

        // 3. NÚCLEO: Coincidencia exacta
        const exactMatches = sourceNodes.filter((n) => {
          const matchLinea = n.lineaNegocio === selectedLinea;

          // Corrección para Costo
          const matchCosto =
            selectedCosto === "todos" || n.centroCosto === selectedCosto;

          // Si es "todos", devuelve true. Si no, compara.
          const matchProposito =
            selectedProposito === "todos" || n.proposito === selectedProposito;

          return matchLinea && matchCosto && matchProposito;
        });

        if (exactMatches.length === 0) {
          chart.load([]);
          loaderOverlay.classList.remove("visible");
          return;
        }

        // 4. RECONSTRUCCIÓN DE JERARQUÍA
        const finalNodesMap = new Map();

        const addNodeWithAncestors = (node) => {
          finalNodesMap.set(node.id, node);
          if (node.pid) {
            const parentNode = fullNodeMap.get(node.pid);
            if (parentNode) {
              const isSameLine = parentNode.lineaNegocio === selectedLinea;
              if (isSameLine) {
                addNodeWithAncestors(parentNode);
              }
            }
          }
        };

        exactMatches.forEach((node) => {
          addNodeWithAncestors(node);
        });

        // 5. IDENTIFICAR AL "LÍDER LOCAL"
        const finalNodesList = Array.from(finalNodesMap.values());
        finalNodesList.sort((a, b) => (a.order || 99) - (b.order || 99));

        if (finalNodesList.length === 0) {
          chart.load([]);
          return;
        }

        const localMainBoss = finalNodesList[0];
        console.log("Líder Local:", localMainBoss.nombre);

        // ------------------------------------------------------------------
        // 5.5 NUEVO: RESCATAR JEFES SUPERIORES
        // ------------------------------------------------------------------
        const upperBossesMap = new Map();

        const addUpperAncestors = (node) => {
          if (node.pid) {
            const parentNode = fullNodeMap.get(node.pid);

            // --- MODIFICACIÓN SOLICITADA: FRENO EN EL PRESIDENTE ---
            // Si el propósito NO es "todos" (ej: Sistemas) y el padre es el Presidente...
            // DETENEMOS LA BÚSQUEDA. No lo agregamos.
            if (
              selectedLinea !== "CORPORATIVO" &&
              parentNode &&
              String(parentNode.codPosicion) === "00001"
            ) {
              return;
            }
            // -------------------------------------------------------

            if (
              parentNode &&
              !finalNodesMap.has(parentNode.id) &&
              !upperBossesMap.has(parentNode.id)
            ) {
              upperBossesMap.set(parentNode.id, parentNode);
              addUpperAncestors(parentNode);
            }
          }
        };

        addUpperAncestors(localMainBoss);

        // Unimos los mapas
        const allRenderNodesMap = new Map([
          ...finalNodesMap,
          ...upperBossesMap,
        ]);

        // Buscamos quién es el VERDADERO Root ahora
        const allRenderList = Array.from(allRenderNodesMap.values());
        allRenderList.sort((a, b) => (a.order || 99) - (b.order || 99));
        const absoluteRoot = allRenderList[0];

        // ------------------------------------------------------------------

        // 6. CLASIFICACIÓN FINAL Y RENDERIZADO
        const nodesToRender = new Map();
        const servicesToGroup = [];

        // Detección de Caso Especial (Corporativo + Todos)
        const isCorpTodos =
          selectedLinea === "CORPORATIVO" &&
          selectedCosto === "CORPORATIVO" &&
          selectedProposito === "todos";

        const isConnectedToRoot = (nodeId) => {
          if (nodeId === absoluteRoot.id) return true;
          let curr = allRenderNodesMap.get(nodeId);
          while (curr && curr.pid) {
            if (curr.pid === absoluteRoot.id) return true;
            if (allRenderNodesMap.has(curr.pid)) {
              curr = allRenderNodesMap.get(curr.pid);
            } else {
              return false;
            }
          }
          return false;
        };

        for (const node of allRenderList) {
          if (node.id === absoluteRoot.id) {
            const root = Object.assign({}, node);
            root.pid = null;
            nodesToRender.set(root.id, root);
            continue;
          }

          if (isConnectedToRoot(node.id)) {
            nodesToRender.set(node.id, node);
          } else {
            // Si está desconectado:
            if (isCorpTodos) {
              // EXCEPCIÓN: Conectar al Presidente en modo TODOS
              const forcedNode = Object.assign({}, node);
              forcedNode.pid = absoluteRoot.id;
              nodesToRender.set(forcedNode.id, forcedNode);
            } else {
              // Normal: Es servicio
              servicesToGroup.push(node);
            }
          }
        }

        // 7. CREAR GRUPOS
        if (servicesToGroup.length > 0) {
          const bossForGroups = nodesToRender.has(localMainBoss.id)
            ? localMainBoss
            : absoluteRoot;
          const ghostId = `GHOST_${bossForGroups.id}`;
          const ghostNode = {
            id: ghostId,
            pid: bossForGroups.id,
            tags: ["fantasma", "assistant", "assistant-branch"],
            nombre: "",
          };
          nodesToRender.set(ghostId, ghostNode);

          const groupsMap = {};
          servicesToGroup.forEach((emp) => {
            let groupName = emp.departamento || emp.proposito || "SERVICIOS";
            groupName = groupName.trim().toUpperCase();
            if (!groupsMap[groupName]) groupsMap[groupName] = [];
            groupsMap[groupName].push(emp);
          });

          Object.keys(groupsMap).forEach((groupName) => {
            const employees = groupsMap[groupName];
            const groupId = `GRP_${groupName.replace(/[^a-zA-Z0-9]/g, "")}_${Math.floor(Math.random() * 1000)}`;
            const groupNode = {
              id: groupId,
              pid: ghostId,
              nombre: groupName,
              title: `${employees.length} Colaboradores`,
              tags: ["group"],
              templateName: "group",
            };
            nodesToRender.set(groupId, groupNode);

            employees.forEach((emp) => {
              const empClone = Object.assign({}, emp);
              empClone.pid = null;
              empClone.stpid = groupId;
              nodesToRender.set(empClone.id, empClone);
            });
          });
        }

        // 8. Cargar
        const finalArray = Array.from(nodesToRender.values());
        //chart.config.collapse = { level: 3, allChildren: true };

        if (finalArray.length > 0) {
          chart.load(finalArray);
          setTimeout(() => expandirFantasmas(), 10);
          setTimeout(() => chart.fit(), 50);
        } else {
          chart.load([]);
        }
        loaderOverlay.classList.remove("visible");
      }

      // Función recursiva para calcular hijos y nietos
      function calcularDescendenciaManual(nodes) {
        // 1. Convertir array a mapa para acceso rápido
        const map = {};
        nodes.forEach((n) => (map[n.id] = n));

        // 2. Agrupar hijos por padre
        const childrenMap = {};
        nodes.forEach((n) => {
          if (n.pid) {
            if (!childrenMap[n.pid]) childrenMap[n.pid] = [];
            childrenMap[n.pid].push(n.id);
          }
        });

        // 3. Función recursiva para contar
        function getTotals(nodeId) {
          let total = 0;
          const children = childrenMap[nodeId] || [];
          // Guardamos los directos
          if (map[nodeId]) map[nodeId]._directos = children.length;

          // Sumamos recursivamente
          total += children.length;
          children.forEach((childId) => {
            total += getTotals(childId) - (map[childId]._directos || 0); // Ajuste matemático simple: sumamos la rama completa
            // Corrección simplificada:
            // El total de un nodo es la suma de (1 + total de descendientes) de cada hijo.
            // Pero para hacerlo fácil:
          });
          return total;
        }

        // RE-CALCULO MÁS ROBUSTO Y SIMPLE
        // Iteramos al revés (desde el nivel más bajo hacia arriba) o recursivo simple
        const getDeepCount = (nid) => {
          const kids = childrenMap[nid] || [];
          let sum = 0;
          kids.forEach((kidId) => {
            sum += 1 + getDeepCount(kidId); // 1 (el hijo) + sus descendientes
          });
          return sum;
        };

        nodes.forEach((node) => {
          node._directos = (childrenMap[node.id] || []).length;
          node._total = getDeepCount(node.id);
        });
      }

      /* FUNCION PARA GENERAR URL DE LOS MANUALES */
      function getManualUrl(nodeData, tipo) {
        let carpeta = "";

      // --- Función Principal: Cargar, Mapear y Renderizar ---
      async function loadAndRenderChart(apiUrl) {
        loaderOverlay.classList.add("visible");

        treeDiv.innerHTML = "";

        try {
          // 1. Fetch API
          console.log("Iniciando fetch a:", apiUrl);
          const response = await fetch(apiUrl);
          if (!response.ok)
            throw new Error(
              `Error HTTP ${response.status}: ${response.statusText}`,
            );
          console.log(`API respondió (${response.status}). Procesando...`);
          const apiResponse = await response.json();
          const flatApiData = Array.isArray(apiResponse?.Persona)
            ? apiResponse.Persona
            : null;
          if (!Array.isArray(flatApiData))
            throw new Error(
              "Formato inválido. No se encontró array en 'Persona'.",
            );
          if (flatApiData.length === 0) {
            loaderText.innerText = "API OK, pero no hay datos.";
            return;
          }
          //loaderText.innerText = `Datos recibidos (${flatApiData.length}). Procesando...`;

          // 2. Pre-cálculo Mapa Posición -> Empleado (Lógica clave de la jerarquía de personas)
          const positionToEmployeeMap = new Map();
          flatApiData
            .filter(
              (emp) =>
                emp &&
                emp.codigoPosicion != null &&
                emp.vacante !== "1" &&
                emp.codigoEmpleado,
            )
            .forEach((emp) => {
              const positionId = String(emp.codigoPosicion).trim();
              const employeeId = String(emp.codigoEmpleado).trim();
              if (!positionToEmployeeMap.has(positionId)) {
                positionToEmployeeMap.set(positionId, employeeId);
              } else {
                //console.warn(`Advertencia: Posición ${positionId} asignada a múltiples empleados. Usando ${positionToEmployeeMap.get(positionId)}.`);
              }
            });
          console.log(
            `Mapa Posición->Empleado creado con ${positionToEmployeeMap.size} entradas.`,
          );

          // 3. Transformación (Lógica Híbrida: IDs de Empleado + IDs de Posición para vacantes)
          const balkanNodes = flatApiData
            .filter(
              (emp) =>
                emp &&
                //emp.codigoPosicion != null &&
                emp.codigoPosicion != "00006" &&
                //emp.codigoPosicion != "00001" &&
                emp.puesto != null,
              //!(emp.codigoPosicionReporta === "00003" && emp.vacante === "1")
            )
            .map((emp) => {
              const isVacant = emp.vacante === "1";

              // ID HÍBRIDO: Usamos codigoEmpleado si existe, si no, codigoPosicion
              const id = isVacant
                ? String(emp.codigoPosicion).trim()
                : String(emp.codigoEmpleado).trim();

              const CodEmpleado = isVacant
                ? parseInt(emp.codigoPosicion)
                : parseInt(emp.codigoEmpleado);

              let pid = emp.codigoPosicionReporta
                ? String(emp.codigoPosicionReporta).trim()
                : null;

              if (pid && pid !== "0") {
                // El 'pid' SIEMPRE es una POSICIÓN.
                // Buscamos a qué 'id' (empleado o posición) corresponde.
                const managerEmployeeId = positionToEmployeeMap.get(pid);

                if (managerEmployeeId) {
                  // Encontrado: El jefe (empleado) es el pid.
                  pid = managerEmployeeId;
                } else {
                  // No encontrado: El jefe está vacante, el 'pid' es la POSICIÓN del jefe.
                  pid = pid; // Se mantiene como codigoPosicion
                }

              } else {

              }

              // Lógica de Tags (Lógica de estilo)
              const levelTag = `level-${emp.nivelJerarquico || "99"}`; // Tag para CSS
              let tags = [levelTag];
              const order = parseInt(emp.nivelJerarquico || 99);

                return {

                  nombre: "PUESTO VACANTE",

                      return depto && depto !== "N/A" ? `${cargo} - ${depto}` : cargo;
                  })(),

          chart.onInit(function () {

            console.log("Funcionando...", this);

            if (chart.searchUI && chart.searchUI.input) {
              chart.searchUI.input.addEventListener(
                "keydown",
                function (event) {
                  if (event.key === "Enter") {
                    event.preventDefault(); // Previene el envío del formulario

                    const searchTable = chart.searchUI.searchTableWrapper;
                    if (!searchTable) return;

                    // 1. Busca el item SELECCIONADO (el que tiene data-selected="yes")
                    let elementToClick = searchTable.querySelector(
                      'tr[data-selected="yes"]',
                    );

                    if (!elementToClick) {
                      // 2. Si no hay ninguno seleccionado, busca el PRIMER item de la lista
                      // (el primer tr que tenga el atributo data-search-item-id)
                      elementToClick = searchTable.querySelector(
                        "tr[data-search-item-id]",
                      );
                    }

                    // 3. Simula el clic en el elemento encontrado (esto dispara tu 'searchclick')
                    if (elementToClick) {
                      elementToClick.click();
                    }
                  }

                  if (
                    event.key.length === 1 &&
                    event.key >= "0" &&
                    event.key <= "9" &&
                    !event.ctrlKey &&
                    !event.altKey &&
                    !event.metaKey
                  ) {
                    event.preventDefault();
                  }
                },
              );
            }

            /*   Crear y hacer funcionar boton de lupa que muestra el input search  */
            // 1. Encontrar los elementos de Balkan
            const chartContainer = this.element; // El div #tree
            const searchElement = this.element.querySelector(".boc-search");
            const searchInput =
              this.searchUI && this.searchUI.input ? this.searchUI.input : null;
            
            // =================================================================
            // ✅ NUEVO INTERCEPTOR: Reordena la lista al teclear en el buscador
            // =================================================================
            chart.searchUI.input.addEventListener("input", function (e) {
                const query = e.target.value.toLowerCase().trim();
                if (!query) return;

                const procesarFilas = () => {
                    const rows = document.querySelectorAll("tr[data-search-item-id]");
                    if (rows.length === 0) return;
                    
                    rows.forEach(row => {
                        const nodeId = row.getAttribute("data-search-item-id");
                        const nodeData = chart.get(nodeId);
                        
                        if (!nodeData?.listaEmpleados || 
                            document.getElementById("modo-select").value !== "Cargo" ||
                            nodeData.listaEmpleados.length <= 2) return;
                        
                        const td = row.querySelector("td.boc-search-text-td");
                        if (!td) return;
                        const br = td.querySelector("br");
                        if (!br) return;

                        // Reordenar nombres
                        let listaNombres = nodeData.listaEmpleados
                            .map(emp => `${emp.nombre || ""} ${emp.apellido || ""}`.trim());
                        
                        const matchIndex = listaNombres.findIndex(n => 
                            n.toLowerCase().includes(query));
                        if (matchIndex > 0) {
                            const matchName = listaNombres.splice(matchIndex, 1)[0];
                            listaNombres.unshift(matchName);
                        }

                        // Resaltar query
                        const resaltar = (nombre) => {
                            const idx = nombre.toLowerCase().indexOf(query);
                            if (idx === -1) return nombre;
                            return nombre.substring(0, idx) + 
                                  `<mark>${nombre.substring(idx, idx + query.length)}</mark>` + 
                                  nombre.substring(idx + query.length);
                        };

                        let nuevoHtml = resaltar(listaNombres[0]);
                        if (listaNombres[1]) nuevoHtml += ", " + resaltar(listaNombres[1]);
                        if (listaNombres.length > 2) nuevoHtml += "...";

                        // Eliminar nodos después del <br>
                        let sibling = br.nextSibling;
                        while (sibling) {
                            const next = sibling.nextSibling;
                            td.removeChild(sibling);
                            sibling = next;
                        }

                        // Insertar nuevo HTML
                        const span = document.createElement("span");
                        span.innerHTML = nuevoHtml;
                        while (span.firstChild) {
                            td.appendChild(span.firstChild);
                        }
                    });
                };

                // ✅ MutationObserver: detecta cuando Balkan termina de renderizar
                const searchTable = document.querySelector(".boc-search > div:last-child");
                if (searchTable) {
                    const observer = new MutationObserver(() => {
                        observer.disconnect(); // Solo ejecutar una vez
                        procesarFilas();
                    });
                    observer.observe(searchTable, { childList: true, subtree: true });
                }
                
                // Fallback con timeout por si el observer no detecta cambios
                setTimeout(procesarFilas, 200);
            });

            const menuElement = this.element.querySelector("[data-ctrl-menu]"); // Las 3 rayitas
            if (searchElement && menuElement && searchInput) {
              // 2. Crear nuestro nuevo icono (la lupa)
              const searchIcon = document.createElement("div");
              searchIcon.id = "custom-search-icon";
              searchIcon.title = "Buscar";
              searchIcon.innerHTML = `<svg viewBox="0 0 24 24">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>`;

              // 3. Insertar nuestro icono en el DOM de Balkan
              // Lo pone justo *antes* del menú de 3 rayitas
              menuElement.parentNode.insertBefore(searchIcon, menuElement);

              // 4. Asignar el evento click al icono
              searchIcon.addEventListener("click", function (e) {
                e.stopPropagation(); // Evitar que el clic se propague
                // 5. Alternar (toggle) la clase que lo hace visible
                const isVisible = searchElement.classList.toggle("is-visible");
                // 6. Si ahora está visible, poner el foco en el input
                if (isVisible && searchInput) {
                  searchInput.focus();
                }
              });
              // 7. (Opcional) Ocultar si se hace clic fuera del buscador
              document.addEventListener("click", function (e) {
                // Si el clic NO fue en el buscador Y NO fue en el icono...
                if (
                  !searchElement.contains(e.target) &&
                  !searchIcon.contains(e.target)
                ) {
                  searchElement.classList.remove("is-visible");
                }
              });
            } else {
              console.error(
                "onInit: No se pudieron encontrar los elementos de la UI de Balkan (search, menu, input).",
              );
            }

            // Event Listener para botones de foco
            this.element.addEventListener("mousedown", function(e) {
                const focusBtn = e.target.closest("[data-focus-btn]");
                if (focusBtn) {
                    e.stopImmediatePropagation(); // Detiene TODOS los listeners
                    e.preventDefault();
                    
                    const nodeId = focusBtn.getAttribute("data-focus-btn");
                    
                    if (focusState.active && focusState.targetNodeId === nodeId) {
                        desactivarModoFoco();
                    } else {
                        activarModoFoco(nodeId);
                    }
                    
                    return false;
                }
            }, true); // Captura en fase de captura

            // chart.config.scaleInitial = OrgChart.match.boundary;
            // chart._draw(true, OrgChart.action.init, { method: 'fit' });
            //procesarLoginDeUsuario();
            // --- CERRAR SELECT2 AL CLICKEAR EN EL GRÁFICO ---
            // Detectamos 'mousedown' en el contenedor del gráfico (#tree)
          });

          // Asegurar que el chart inicie en modo Persona
          document.getElementById("modo-select").value = "Persona";
          chart.config.template = "fichaTemplate";
          chart.config.nodeBinding = personaBinding;

          procesarLoginDeUsuario();
          // Asegurar ocultar filtros secundarios al inicio también
          $("#centro-costos-select").next(".select2-container").hide();
          $("#proposito-select").next(".select2-container").hide();
          //   statusDiv.style.display = "none"; // Ocultar "Cargando..."
          loaderOverlay.classList.remove("visible");
        } catch (error) {
          console.error("ERROR DETALLADO:", error);
          loaderText.innerText = "Error.";
          errorDiv.innerText = `Error: ${error.message}. Revisa la consola (F12).`;
          errorDiv.style.display = "block";
